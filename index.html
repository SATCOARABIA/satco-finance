<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SATCO — FINANCE PORTAL</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --stk-1: 64px;   /* app topbar height (measured live via JS, this is just the first-paint fallback) */
    --stk-2: 110px;  /* + per-table toolbar row (measured live) */
    --stk-3: 150px;  /* + filter row (measured live; thead sticks here) */
    --bg: #f6f8fb;
    --panel: #ffffff;
    --panel-soft: #f8fafc;
    --text: #0f172a;
    --muted: #64748b;
    --line: #e2e8f0;
    --line-strong: #cbd5e1;
    --brand: #0f172a;
    --brand-2: #1e293b;
    --accent: #0ea5e9;
    --accent-soft: #e0f2fe;
    --success: #166534;
    --success-soft: #dcfce7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --warning: #d97706;
    --warning-soft: #fef3c7;
    --radius: 18px;
    --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin:0;
    font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(14,165,233,.16), transparent 30%),
      linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
    color:var(--text);
    min-height:100vh;
  }
  button, input, select, textarea { font: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 3px solid rgba(14,165,233,.25);
    outline-offset: 2px;
  }
  .container { width:100%; max-width:none; margin:0; padding:0; }
  .hr-row:hover { background:#f0f9ff !important; cursor:pointer; }
  ::-webkit-scrollbar { height:16px; width:16px; }
  ::-webkit-scrollbar-track { background:#e2e8f0; border-radius:10px; }
  ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:10px; border:3px solid #e2e8f0; }
  ::-webkit-scrollbar-thumb:hover { background:#64748b; }
  * { scrollbar-width:auto; scrollbar-color:#94a3b8 #e2e8f0; }
  .drag-scroll { overflow:auto; cursor:grab; scrollbar-width:auto; scrollbar-color:#94a3b8 #e2e8f0; -webkit-overflow-scrolling:touch; }
  .drag-scroll.dragging { cursor:grabbing; user-select:none; }
  .drag-scroll table { cursor:grab; }
  .drag-scroll.dragging table { cursor:grabbing; }
  .drag-scroll::before { content:'Hold mouse and drag this table left/right'; display:block; font-size:11px; font-weight:800; color:#64748b; padding:6px 10px; background:#f8fafc; border-bottom:1px solid #e2e8f0; }

  .satco-shell { min-height:100vh; display:grid; grid-template-columns:minmax(0,1fr); }
  .satco-sidebar {
    display:none;
    position:sticky; top:0; height:100vh; overflow:auto; padding:18px;
    background:rgba(255,255,255,.84); border-right:1px solid var(--line);
    backdrop-filter: blur(18px);
  }
  .brand-card {
    display:flex; flex-direction:column; gap:10px; align-items:flex-start; padding:14px; border:1px solid var(--line);
    border-radius:22px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff;
    box-shadow: var(--shadow);
  }
  .brand-mark {
    width:42px; height:42px; display:grid; place-items:center; border-radius:15px;
    background:rgba(255,255,255,.12); font-weight:900; letter-spacing:-.04em;
  }
  .brand-title { font-weight:900; font-size:15px; line-height:1.15; }
  .brand-subtitle { color:#cbd5e1; font-size:12px; margin-top:3px; }
  .brand-logo-wrap {
    width:220px; height:50px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    border-radius:12px; background:#fff; padding:2px 4px; box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);
  }
  .brand-logo { width:100%; height:100%; object-fit:contain; display:block; image-rendering:auto; }
  .portal-name { font-size:17px; line-height:1; font-weight:950; letter-spacing:.03em; color:#fff; }
  .brand-card .portal-name { color:#fff; }
  .topbar-brand { display:flex; align-items:center; gap:9px; min-width:0; margin-bottom:0; }
  .topbar-brand .brand-logo-wrap { width:140px; height:32px; border:1px solid var(--line); box-shadow:0 6px 16px rgba(15,23,42,.06); }
  .topbar-brand .portal-name { color:#0f172a; font-size:13px; letter-spacing:.03em; }
  .topbar-brand .brand-subtitle { color:#64748b; font-size:9.5px; font-weight:800; margin-top:0; }

  .nav-group { margin-top:18px; }
  .nav-title { color:var(--muted); font-size:11px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; margin:0 0 8px 8px; }
  .nav-btn {
    width:100%; display:flex; gap:11px; align-items:center; border:1px solid transparent;
    background:transparent; color:#334155; border-radius:15px; padding:10px 12px; cursor:pointer;
    font-weight:800; font-size:13px; text-align:left; transition:.16s ease;
  }
  .nav-btn:hover { background:#f1f5f9; color:#0f172a; transform:translateX(2px); }
  .nav-btn.active { background:#0f172a; color:#fff; box-shadow:0 10px 24px rgba(15,23,42,.18); }
  .nav-icon { width:26px; height:26px; display:grid; place-items:center; border-radius:10px; background:#f1f5f9; font-size:14px; flex:0 0 auto; }
  .nav-btn.active .nav-icon { background:rgba(255,255,255,.14); }
  .nav-caption { display:block; color:#94a3b8; font-size:11px; font-weight:700; margin-top:1px; }
  .nav-btn.active .nav-caption { color:#cbd5e1; }
  .sidebar-footer { margin-top:18px; padding:14px; border:1px solid var(--line); border-radius:18px; background:#f8fafc; }
  .sidebar-footer strong { display:block; font-size:13px; margin-bottom:4px; }
  .sidebar-footer span { display:block; color:var(--muted); font-size:12px; line-height:1.4; }

  .satco-main { min-width:0; padding:12px 20px 20px; }
  .topbar {
    display:flex; justify-content:space-between; gap:14px; align-items:center; margin:0 0 6px;
    position:sticky; top:0; z-index:40; padding:8px 0;
    background:linear-gradient(180deg,#f8fbfd 0%,#eef2f7 92%); border-bottom:1px solid var(--line);
  }
  .eyebrow { display:none; }
  .page-title { margin:0; font-size:18px; letter-spacing:-.03em; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .page-desc { margin-top:2px; color:#64748b; max-width:760px; font-size:11.5px; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .top-actions { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-end; align-items:center; overflow:hidden; }
  .pill {
    display:inline-flex; align-items:center; gap:6px; min-height:24px; padding:4px 9px; border-radius:999px;
    border:1px solid var(--line); background:#fff; color:#334155; font-size:11px; font-weight:800;
  }
  .pill.good { color:#166534; background:#f0fdf4; border-color:#bbf7d0; }
  .pill.warn { color:#92400e; background:#fffbeb; border-color:#fde68a; }
  .signout-btn {
    min-height:24px; padding:4px 10px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:#475569; font-weight:900; font-size:11px; cursor:pointer;
  }
  .signout-btn:hover { border-color:#94a3b8; color:#0f172a; }

  .dashboard-home-btn {
    min-height:24px; padding:4px 10px; border-radius:999px; border:1px solid #bfdbfe;
    background:#eff6ff; color:#1d4ed8; font-weight:950; font-size:11px; cursor:pointer;
    box-shadow:0 8px 18px rgba(37,99,235,.08);
  }
  .dashboard-home-btn:hover { background:#dbeafe; border-color:#93c5fd; color:#1e40af; }

  .mobile-section-picker { display:none; margin:0 0 8px; }
  .mobile-section-picker select { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line); background:#fff; font-weight:800; }
  .guide-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:16px; }
  .guide-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:14px; box-shadow:0 8px 24px rgba(15,23,42,.04); }
  .guide-card b { display:block; font-size:13px; margin-bottom:4px; }
  .guide-card span { color:#64748b; font-size:12.5px; line-height:1.4; }

  .dashboard-launch {
    margin-bottom:18px; border:1px solid var(--line); border-radius:24px; overflow:hidden;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 48%,#0f766e 100%); color:#fff; box-shadow:0 18px 45px rgba(15,23,42,.14);
  }
  .launch-hero { padding:22px 22px 14px; display:flex; justify-content:space-between; gap:18px; align-items:flex-end; flex-wrap:wrap; }
  .launch-kicker { color:#bae6fd; font-size:12px; font-weight:950; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
  .launch-hero h2 { margin:0; font-size:24px; line-height:1.1; letter-spacing:-.04em; }
  .launch-hero p { margin:8px 0 0; max-width:720px; color:#dbeafe; font-size:13.5px; line-height:1.45; }
  .launch-help { display:grid; gap:6px; color:#e2e8f0; font-size:12px; font-weight:750; min-width:220px; }
  .launch-groups { padding:0 16px 16px; display:grid; gap:12px; }
  .launch-group { border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:12px; background:rgba(255,255,255,.08); backdrop-filter:blur(12px); }
  .launch-group-title { font-size:11px; color:#cbd5e1; font-weight:950; letter-spacing:.1em; text-transform:uppercase; margin:0 0 10px 4px; }
  .module-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
  .module-card {
    min-height:86px; width:100%; border:1px solid rgba(255,255,255,.18); border-radius:16px; padding:12px;
    background:rgba(255,255,255,.96); color:#0f172a; text-align:left; cursor:pointer; display:flex; gap:11px; align-items:flex-start;
    box-shadow:0 10px 25px rgba(15,23,42,.10); transition:.16s ease; touch-action:manipulation;
  }
  .module-card:hover { transform:translateY(-2px); box-shadow:0 18px 35px rgba(15,23,42,.18); }
  .module-card.active { outline:3px solid rgba(186,230,253,.6); background:#eff6ff; }
  .module-card-icon { width:38px; height:38px; border-radius:14px; display:grid; place-items:center; background:#f1f5f9; font-size:18px; flex:0 0 auto; }
  .module-card-title { font-size:13.5px; font-weight:950; line-height:1.15; }
  .module-card-desc { margin-top:4px; color:#64748b; font-size:11.5px; line-height:1.3; }
  .dashboard-section-label { display:flex; align-items:center; gap:8px; margin:18px 0 12px; color:#334155; font-size:13px; font-weight:950; letter-spacing:.06em; text-transform:uppercase; }
  .dashboard-section-label:after { content:""; height:1px; background:var(--line); flex:1; }
  .finance-kpi-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:16px; }
  .pnl-row-limit { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; padding:10px 18px; border-top:1px solid #e2e8f0; background:#f8fafc; color:#64748b; font-size:12px; font-weight:800; }
  .pnl-row-limit button { border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 11px; color:#0f172a; font-size:12px; font-weight:900; cursor:pointer; }

  .alert-card { border-radius:16px; padding:12px 14px; margin-bottom:14px; border:1px solid; font-size:13px; line-height:1.45; }
  .alert-card.danger { background:#fef2f2; border-color:#fecaca; color:#991b1b; }
  .content-card {
    background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:24px;
    box-shadow:var(--shadow); padding:12px; overflow:visible;
  }
  .content-card > div:first-child[style*="background:#fff"], .content-card > div:first-child[style*="background: '#fff'"] {
    box-shadow:none;
  }
  .detail-backbar { margin-bottom:14px; }
  .quick-back {
    border:1px solid var(--line); background:#fff; color:#334155; border-radius:999px; padding:9px 14px;
    font-weight:900; cursor:pointer;
  }
  .quick-back:hover { border-color:#94a3b8; color:#0f172a; }

  .login-shell {
    min-height:100vh; display:grid; place-items:center; padding:24px;
    background:
      radial-gradient(circle at 15% 10%, rgba(14,165,233,.22), transparent 32%),
      radial-gradient(circle at 85% 20%, rgba(15,23,42,.14), transparent 30%),
      linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
  }
  .login-card { width:min(920px,100%); display:grid; grid-template-columns:1.1fr .9fr; background:#fff; border:1px solid var(--line); border-radius:28px; overflow:hidden; box-shadow:var(--shadow); }
  .login-hero { padding:38px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; display:flex; flex-direction:column; justify-content:space-between; min-height:430px; }
  .login-hero h1 { margin:16px 0 10px; font-size:34px; line-height:1.05; letter-spacing:-.05em; }
  .login-hero p { margin:0; color:#cbd5e1; line-height:1.55; font-size:14px; max-width:420px; }
  .login-checks { display:grid; gap:9px; margin-top:24px; }
  .login-checks div { color:#e2e8f0; font-size:13px; font-weight:700; }
  .login-form { padding:38px; display:flex; flex-direction:column; justify-content:center; }
  .login-form h2 { margin:0 0 5px; font-size:22px; letter-spacing:-.03em; }
  .login-form .hint { color:#64748b; margin-bottom:22px; font-size:13px; }
  .login-error { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; padding:10px 12px; border-radius:12px; font-size:12px; margin-bottom:12px; }

  @media (max-width: 980px) {
    .satco-shell { display:block; }
    .satco-sidebar { display:none; }
    .satco-main { padding:16px; }
    .topbar { flex-direction:column; align-items:stretch; }
    .top-actions { justify-content:flex-start; flex-wrap:wrap; overflow:visible; }
    .mobile-section-picker { display:block; }
    .guide-grid { grid-template-columns:1fr; }
    .content-card { padding:12px; border-radius:18px; }
    .page-title { font-size:24px; }
    .login-card { grid-template-columns:1fr; }
    .login-hero { min-height:auto; padding:28px; }
    .login-form { padding:28px; }

    .topbar-brand { margin-bottom:8px; }
    .topbar-brand .brand-logo-wrap { width:210px; height:45px; }
    .topbar-brand .portal-name { font-size:18px; }
    .dashboard-launch { border-radius:18px; margin-bottom:14px; }
    .launch-hero { padding:18px 16px 10px; align-items:flex-start; }
    .launch-hero h2 { font-size:21px; }
    .launch-help { width:100%; min-width:0; grid-template-columns:1fr; }
    .launch-groups { padding:0 10px 12px; }
    .module-grid { grid-template-columns:1fr; gap:9px; }
    .module-card { min-height:76px; padding:12px; border-radius:15px; }
    .module-card-icon { width:36px; height:36px; }
    .top-actions { width:100%; }
    .pill, .signout-btn { min-height:38px; }
    .content-card input, .content-card select, .content-card textarea { min-height:40px; }
    .content-card button { min-height:38px; }
    .finance-kpi-grid { grid-template-columns:1fr; }
  }

  @media (max-width: 560px) {
    .satco-main { padding:12px; }
    .page-title { font-size:21px; }
    .page-desc { font-size:13px; }
    .topbar-brand .brand-logo-wrap { width:170px; height:36px; }
    .topbar-brand .portal-name { font-size:16px; }
    .topbar-brand .brand-subtitle { font-size:11px; }
    .launch-hero p { font-size:12.5px; }
    .login-hero h1 { font-size:28px; }
  }
</style>
</head>
<body>
<div id="root"></div>
  <!-- Letterhead banners + logo are real .png files (see ./satco-logo.png, ./letterhead-header.png, ./letterhead-footer.png) -->
  <!-- App code is split across part1-6 .jsx files below (same pattern as the HR portal) instead of one inline <script> -->
<script type="text/babel" data-presets="react" src="./part1-core-utils.jsx"></script>
<script type="text/babel" data-presets="react" src="./part2-cost-tracking.jsx"></script>
<script type="text/babel" data-presets="react" src="./part3-billing-camp-ppe.jsx"></script>
<script type="text/babel" data-presets="react" src="./part4-hiring-wps.jsx"></script>
<script type="text/babel" data-presets="react" src="./part5-dashboard-employee.jsx"></script>
<script type="text/babel" data-presets="react" src="./part6-salary-pipeline-app.jsx"></script>
</body>
</html>
