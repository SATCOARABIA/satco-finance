// ── CSV EXPORT HELPER ─────────────────────────────────────────────
function exportCSV(rows, filename, colDefs) {
  if (!rows || rows.length === 0) return alert('No data to export');
  const headers = colDefs.map(c => c.label);
  const lines   = [headers.join(',')];
  rows.forEach(r => {
    const vals = colDefs.map(c => {
      const v = r[c.key] !== undefined && r[c.key] !== null ? r[c.key] : '';
      const s = String(v).replace(/"/g, '""');
      return /[,"\n]/.test(s) ? `"${s}"` : s;
    });
    lines.push(vals.join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── MULTI-SECTION CSV EXPORT (one combined file, multiple labeled blocks) ─
function csvRow(vals) {
  return vals.map(v => {
    const s = String(v===undefined||v===null?'':v).replace(/"/g,'""');
    return /[,"\n]/.test(s) ? `"${s}"` : s;
  }).join(',');
}
function exportMultiSectionCSV(sections, filename) {
  const hasData = sections.some(s => s.rows && s.rows.length>0);
  if (!hasData) return alert('No data to export');
  const lines = [];
  sections.forEach(sec => {
    lines.push(csvRow([sec.title]));
    lines.push(csvRow(sec.cols.map(c=>c.label)));
    if (!sec.rows || sec.rows.length===0) {
      lines.push(csvRow(['(no entries)']));
    } else {
      sec.rows.forEach(r => lines.push(csvRow(sec.cols.map(c=>r[c.key]))));
    }
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── HELPERS ──────────────────────────────────────────────────────
const fmt      = (n) => (Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const monthStr = (d) => d ? d.slice(0,7) : '';
const firstOfMonth = (m) => m ? m + '-01' : null;

function groupByMonth(rows, dateKey) {
  const map = new Map();
  rows.forEach(r => {
    const m = String(r[dateKey]||'').slice(0,7) || '—';
    if (!map.has(m)) map.set(m, []);
    map.get(m).push(r);
  });
  const out = [];
  for (const [month, mrs] of map) {
    out.push({ month, rows: [...mrs].sort((a,b)=>(a.employee_id||'')<(b.employee_id||'')?-1:1) });
  }
  out.sort((a,b)=>a.month<b.month?1:a.month>b.month?-1:0);
  return out;
}

function applyFilters(rows, filters) {
  return rows.filter(row =>
    Object.entries(filters).every(([key, val]) => {
      if (!val) return true;
      return String(row[key]||'').toLowerCase().includes(val.toLowerCase());
    })
  );
}

// Calendar days in a "YYYY-MM" month string (used to pro-rate basic salary & allowance)
function daysInMonth(m) {
  if (!m) return 30;
  const parts = m.split('-').map(Number);
  const y = parts[0], mo = parts[1];
  if (!y || !mo) return 30;
  return new Date(y, mo, 0).getDate();
}

// Reproduces SATCO's accounts-department salary-sheet formula:
//   Basic Pay     = Basic Salary ÷ Month Days × Working Days
//   Normal OT     = (Basic Salary ÷ Month Days ÷ Hours/Day) × Normal OT Hours × 1.25
//   Holiday OT    = (Basic Salary ÷ Month Days ÷ Hours/Day) × Holiday OT Hours × 1.5
//   Allowance Pay = Fixed Allowance ÷ Month Days × Working Days
//   Gross         = sum of the above (Food/Accommodation/Transport/Other are tracked separately)
function calcProrated(d) {
  const basic   = Number(d.basic_salary) || 0;
  const allow   = Number(d.fixed_allowance) || 0;
  const hpd     = Number(d.hours_per_day) || 8;
  const mDays   = daysInMonth(d.month);
  const wDays   = Number(d.working_days) || 0;
  const nOT     = Number(d.normal_ot_hours) || 0;
  const hOT     = Number(d.holiday_ot_hours) || 0;
  const basicPay      = mDays ? (basic / mDays * wDays) : 0;
  const hourlyBase     = (mDays && hpd) ? (basic / mDays / hpd) : 0;
  const normalOTPay   = hourlyBase * nOT * 1.25;
  const holidayOTPay  = hourlyBase * hOT * 1.5;
  const allowPay       = mDays ? (allow / mDays * wDays) : 0;
  const gross = basicPay + normalOTPay + holidayOTPay + allowPay;
  return { monthDays: mDays, basicPay, normalOTPay, holidayOTPay, allowPay, gross };
}

  const prefillFromHistory = (employeeId, d) => {

  const isP = !!draft && draft.salary_type==='prorated';
  const isH = !!draft && draft.salary_type==='hourly';
  const isFlat = !!draft && !isP && !isH;
  const calc = isP ? calcProrated(draft) : null;
  const hourlyGrossPreview = isH?(Number(draft.hours_worked)||0)*(Number(draft.hourly_rate)||0):0;
  const netPayablePreview  = isH?hourlyGrossPreview-(Number(draft.salary_deductions)||0):0;

  return (

        <div>
          <div style={{fontWeight:800,fontSize:'14px'}}>Monthly Costs (Salary, Food, Accommodation, Transport)</div>
          <div style={{fontSize:'12px',color:'#64748b'}}>One row per employee per month</div>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          {!hideExportButton && <button style={S.btnExp} onClick={()=>exportCSV(filtered,'monthly_costs',csvCols)}>Export CSV</button>}
          <button style={S.btnPri} onClick={blank}>+ Add Month</button>
        </div>
      </div>

      <FilterBar fields={filterFields} values={filters} onChange={setFilters} onClear={()=>setFilters({})} />

      {draft && (
        <div style={{padding:'14px 18px',borderBottom:'1px solid #e2e8f0',background:'#fffbeb'}}>
          <div style={{marginBottom:'10px'}}>
            <label style={S.label}>Employee</label>
            <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
              onChange={(id,name)=>setDraft(d=>prefillFromHistory(id,{...d,employee_id:id,full_name:name}))} />
          </div>
          <div style={{marginBottom:'12px'}}>
            <label style={S.label}>Salary Type</label>
            <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
              {[['prorated','Calculated — Days + OT (from timesheet)'],['monthly_basic','Fixed Monthly Amount'],['hourly','Hourly Rate']].map(([val,lbl])=>(
                <label key={val} style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',
                  background:draft.salary_type===val?'#0f172a':'#f1f5f9',color:draft.salary_type===val?'#fff':'#475569',
                  border:'1px solid '+(draft.salary_type===val?'#0f172a':'#cbd5e1'),
                  borderRadius:'8px',padding:'8px 14px',fontWeight:700,fontSize:'12.5px'}}>
                  <input type="radio" name="salary_type" value={val} checked={draft.salary_type===val}
                    onChange={()=>setDraft(d=>({...d,salary_type:val}))} style={{display:'none'}} />{lbl}
                </label>
              ))}
            </div>
          </div>
          <div style={{marginBottom:'10px'}}>
            <label style={S.label}>Month</label>
            <input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'160px'}}/>
          </div>

          {isP && (
            <>
              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'12px 14px',marginBottom:'10px'}}>
                <div style={{fontSize:'11px',fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'8px'}}>Fixed pay rates for this employee</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                  <div><label style={S.label}>Basic Salary (AED/month)</label><input type="number" value={draft.basic_salary||''} onChange={e=>setDraft(d=>({...d,basic_salary:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                  <div><label style={S.label}>Fixed Allowance (AED/month)</label><input type="number" value={draft.fixed_allowance||''} onChange={e=>setDraft(d=>({...d,fixed_allowance:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                  <div><label style={S.label}>Hours / Day (OT basis)</label><input type="number" value={draft.hours_per_day===''?'':draft.hours_per_day} onChange={e=>setDraft(d=>({...d,hours_per_day:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                </div>
              </div>
              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'12px 14px',marginBottom:'10px'}}>
                <div style={{fontSize:'11px',fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'8px'}}>This month's attendance &amp; overtime (from site timesheet)</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                  <div><label style={S.label}>Working Days {draft.month?('(of '+daysInMonth(draft.month)+' days in month)'):''}</label><input type="number" value={draft.working_days||''} onChange={e=>setDraft(d=>({...d,working_days:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                  <div><label style={S.label}>Normal OT Hours (×1.25)</label><input type="number" value={draft.normal_ot_hours||''} onChange={e=>setDraft(d=>({...d,normal_ot_hours:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                  <div><label style={S.label}>Holiday OT Hours (×1.5)</label><input type="number" value={draft.holiday_ot_hours||''} onChange={e=>setDraft(d=>({...d,holiday_ot_hours:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                </div>
              </div>

              <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'8px',padding:'10px 14px',marginBottom:'10px',fontSize:'12.5px'}}>
                <div style={{display:'flex',gap:'14px',flexWrap:'wrap',marginBottom:'4px'}}>
                  <span>Basic Pay: <strong>AED {fmt(calc.basicPay)}</strong></span>
                  <span>Normal OT: <strong>AED {fmt(calc.normalOTPay)}</strong></span>
                  <span>Holiday OT: <strong>AED {fmt(calc.holidayOTPay)}</strong></span>
                  <span>Allowance: <strong>AED {fmt(calc.allowPay)}</strong></span>
                </div>
                <div>= Computed Gross Salary: <strong style={{fontSize:'14px'}}>AED {fmt(calc.gross)}</strong></div>
              </div>

              <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',marginBottom:'10px',fontSize:'12.5px',fontWeight:700,color:'#92400e'}}>
                <input type="checkbox" checked={!!draft.manual_override}
                  onChange={e=>{
                    const checked = e.target.checked;
                    setDraft(d=>({...d, manual_override:checked, salary: checked ? (d.salary || (Math.round(calc.gross*100)/100)) : d.salary}));
                  }} />
                Calculation doesn't match what was actually paid — enter the final salary manually
              </label>
              {draft.manual_override && (
                <div style={{marginBottom:'10px',background:'#fffbeb',border:'1px solid #fbbf24',borderRadius:'8px',padding:'10px 14px'}}>
                  <label style={S.label}>Final Salary to Use (AED)</label>
                  <input type="number" value={draft.salary||''} onChange={e=>setDraft(d=>({...d,salary:e.target.value}))} style={{...S.input,width:'220px'}}/>
                  <div style={{fontSize:'11.5px',color:'#92400e',marginTop:'6px'}}>Formula calculated AED {fmt(calc.gross)} — note the reason for the difference in Remarks below.</div>
                </div>
              )}
            </>
          )}

          {isH && (
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'10px'}}>
                <div><label style={S.label}>Hours Worked</label><input type="number" value={draft.hours_worked||''} onChange={e=>setDraft(d=>({...d,hours_worked:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="208"/></div>
                <div><label style={S.label}>Hourly Rate (AED/hr)</label><input type="number" step="0.01" value={draft.hourly_rate||''} onChange={e=>setDraft(d=>({...d,hourly_rate:e.target.value}))} style={{...S.input,width:'100%'}} /></div>
                <div><label style={S.label}>Salary Deductions (AED)</label><input type="number" value={draft.salary_deductions||''} onChange={e=>setDraft(d=>({...d,salary_deductions:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
              {(draft.hours_worked&&draft.hourly_rate)&&(
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'8px',padding:'10px 14px',marginBottom:'10px',fontSize:'12.5px'}}>
                  Gross: <strong>AED {fmt(hourlyGrossPreview)}</strong> · Deductions: <strong style={{color:'#dc2626'}}>AED {fmt(draft.salary_deductions||0)}</strong> · Net: <strong style={{color:netPayablePreview>=0?'#166534':'#dc2626'}}>AED {fmt(netPayablePreview)}</strong>
                </div>
              )}
            </>
          )}

          {isFlat && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px',marginBottom:'10px'}}>
              <div><label style={S.label}>Basic Salary</label><input type="number" value={draft.salary||''} onChange={e=>setDraft(d=>({...d,salary:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Salary Deductions (AED)</label><input type="number" value={draft.salary_deductions||''} onChange={e=>setDraft(d=>({...d,salary_deductions:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'10px'}}>
            <div><label style={S.label}>Food</label><input type="number" value={draft.food||''} onChange={e=>setDraft(d=>({...d,food:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            <div><label style={S.label}>Accommodation</label><input type="number" value={draft.accommodation||''} onChange={e=>setDraft(d=>({...d,accommodation:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            <div><label style={S.label}>Transport</label><input type="number" value={draft.transport||''} onChange={e=>setDraft(d=>({...d,transport:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            <div><label style={S.label}>Other</label><input type="number" value={draft.other||''} onChange={e=>setDraft(d=>({...d,other:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
          </div>

          <div style={{marginBottom:'10px'}}>
            <label style={S.label}>Remarks</label>
            <input value={draft.remarks||''} onChange={e=>setDraft(d=>({...d,remarks:e.target.value}))} style={{...S.input,width:'100%'}}/>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button style={S.btnPri} onClick={save}>Save</button>
            <button style={{...S.btnPri,background:'#fff',color:'#475569',border:'1px solid #cbd5e1'}} onClick={()=>setDraft(null)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12.5px'}}>
          <thead><tr>
            {(hideEmpFilter?['Month','Type','Salary / Gross','Food','Accom.','Transport','Other','Deductions','Net Total','Remarks','']:['Emp ID','Name','Month','Type','Salary / Gross','Food','Accom.','Transport','Other','Deductions','Net Total','Remarks','']).map(h=><th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {loading
              ? <tr><td colSpan={COLS} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>Loading…</td></tr>
              : grouped.length===0
                ? <tr><td colSpan={COLS} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>{rows.length===0?'No entries yet':'No entries match filters'}</td></tr>
                : grouped.map(g=>{
                    const mSalary = g.rows.reduce((s,r)=>s+(Number(r.salary)||0),0);
                    const mFood   = g.rows.reduce((s,r)=>s+(Number(r.food)||0),0);
                    const mAccom  = g.rows.reduce((s,r)=>s+(Number(r.accommodation)||0),0);
                    const mTrans  = g.rows.reduce((s,r)=>s+(Number(r.transport)||0),0);
                    const mOther  = g.rows.reduce((s,r)=>s+(Number(r.other)||0),0);
                    const mDed    = g.rows.reduce((s,r)=>s+(Number(r.salary_deductions)||0),0);
                    const mNet    = mSalary+mFood+mAccom+mTrans+mOther-mDed;
                    return (
                    <React.Fragment key={g.month}>
                      {!hideEmpFilter && <MonthGroup month={g.month} count={g.rows.length} colSpan={COLS} />}
                      {g.rows.map(r=>{
                        const ded=Number(r.salary_deductions)||0;
                        const tot=(r.salary||0)+(r.food||0)+(r.accommodation||0)+(r.transport||0)+(r.other||0)-ded;
                        const rIsP = r.salary_type==='prorated';
                        return (
                          <tr key={r.id} className="hr-row" style={{borderTop:'1px solid #f1f5f9'}}
                            onDoubleClick={()=>setDraft({...r,month:monthStr(r.month),salary_type:r.salary_type||'monthly_basic'})}>
                            {!hideEmpFilter && <td style={{...S.td,fontFamily:'ui-monospace,monospace',fontWeight:700,color:'#2563eb'}}>{r.employee_id}</td>}
                            {!hideEmpFilter && <td style={{...S.td,fontWeight:600,whiteSpace:'normal'}}>{r.full_name}</td>}
                            <td style={S.td}>{monthStr(r.month)}</td>
                            <td style={S.td}><SalaryTypeBadge type={r.salary_type}/></td>
                            <td style={{...S.td,whiteSpace:'normal'}}>
                              {fmt(r.salary)}
                              {rIsP && (
                                <div style={{fontSize:'10.5px',color:'#94a3b8',fontWeight:600,marginTop:'2px'}}>
                                  {r.working_days||0}/{r.month_days||'—'}d · OT {r.normal_ot_hours||0}h + Hol {r.holiday_ot_hours||0}h
                                  {r.manual_override && <span style={{color:'#dc2626'}}> · overridden (calc AED {fmt(r.computed_salary)})</span>}
                                </div>
                              )}
                            </td>
                            <td style={S.td}>{fmt(r.food)}</td>
                            <td style={S.td}>{fmt(r.accommodation)}</td>
                            <td style={S.td}>{fmt(r.transport)}</td>
                            <td style={S.td}>{fmt(r.other)}</td>
                            <td style={{...S.td,color:'#dc2626'}}>{ded>0?'-'+fmt(ded):'—'}</td>
                            <td style={{...S.td,fontWeight:700}}>{fmt(tot)}</td>
                            <td style={S.tdWrap}>{r.remarks||'—'}</td>
                            <td style={{...S.td,textAlign:'right',whiteSpace:'nowrap'}}>
                              <button style={S.iconBtn} onClick={e=>{e.stopPropagation();setDraft({...r,month:monthStr(r.month),salary_type:r.salary_type||'monthly_basic'});}}>&#9998;</button>
                              <button style={S.iconBtn} onClick={e=>{e.stopPropagation();remove(r.id);}}>&#128465;</button>
                            </td>
                          </tr>
                        );
                      })}
                      <tr style={{borderTop:'2px solid #e2e8f0',background:'#f8fafc'}}>
                        {!hideEmpFilter && <td style={S.td}></td>}
                        {!hideEmpFilter && <td style={{...S.td,fontWeight:800,fontSize:'11px',color:'#64748b',textTransform:'uppercase'}}>Month Total</td>}
                        {hideEmpFilter && <td style={{...S.td,fontWeight:800,fontSize:'11px',color:'#64748b',textTransform:'uppercase'}} colSpan={2}>Month Total</td>}
                        <td style={{...S.td,fontWeight:800}}>AED {fmt(mSalary)}</td>
                        <td style={{...S.td,fontWeight:800}}>{fmt(mFood)}</td>
                        <td style={{...S.td,fontWeight:800}}>{fmt(mAccom)}</td>
                        <td style={{...S.td,fontWeight:800}}>{fmt(mTrans)}</td>
                        <td style={{...S.td,fontWeight:800}}>{fmt(mOther)}</td>
                        <td style={{...S.td,fontWeight:800,color:'#dc2626'}}>{mDed>0?'-'+fmt(mDed):'—'}</td>
                        <td style={{...S.td,fontWeight:800}}>{fmt(mNet)}</td>
                        <td style={S.td}></td>
                        <td style={S.td}></td>
                      </tr>
                    </React.Fragment>
                  );})
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── TIMESHEETS ────────────────────────────────────────────────────
function TimesheetsTable({ employees, initialFilter, hideEmpFilter, hideExportButton }) {
  const [rows, setRows]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft]     = useState(null);
  const [filters, setFilters] = useState(initialFilter||{});
  useEffect(()=>{ if (initialFilter) setFilters(initialFilter); },[initialFilter&&initialFilter.employee_id]);

  const load = async () => {
    setLoading(true);
    const {data,error} = await db.from('employee_timesheets').select('*').order('month',{ascending:false});
    if (!error) setRows(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const filterFields = [
    ...(hideEmpFilter?[]:[{key:'employee_id', label:'Emp ID',  width:'100px'},{key:'full_name',label:'Name',width:'150px'}]),
    {key:'client_project', label:'Client / Project', width:'150px'},
    {key:'income_type',    label:'Mode',             width:'120px', options:[{value:'hourly',label:'Hourly'},{value:'direct',label:'Direct'}]},
    {key:'remarks',        label:'Remarks',          width:'150px'},
  ];

  const filtered = useMemo(()=>applyFilters(rows,filters),[rows,filters]);
  const grouped  = useMemo(()=>groupByMonth(filtered,'month'),[filtered]);
  const COLS = hideEmpFilter?8:10;

  const csvCols = [
    {key:'employee_id',label:'Emp ID'},{key:'full_name',label:'Name'},
    {key:'month',label:'Month'},{key:'client_project',label:'Client/Project'},
    {key:'income_type',label:'Mode'},{key:'hours',label:'Hours'},
    {key:'rate',label:'Rate'},{key:'remarks',label:'Remarks'},
  ];

  const blank = ()=>setDraft({employee_id:initialFilter&&initialFilter.employee_id||'',full_name:initialFilter&&initialFilter.full_name||'',month:'',client_project:'',income_type:'hourly',hours:'',rate:'',direct_income:'',remarks:''});
  const rowIncome = (r)=>(r.hours||0)*(r.rate||0);
  const totalIncome = rows.reduce((s,r)=>s+rowIncome(r),0);

  const openEdit = (r) => {
    const isDir=r.income_type==='direct';
    setDraft({...r,month:monthStr(r.month),income_type:r.income_type||'hourly',direct_income:isDir?r.rate:'',hours:isDir?'':r.hours,rate:isDir?'':r.rate});
  };
  const save = async () => {
    if (!draft.employee_id||!draft.month) return alert('Employee ID and month are required');
    const isDir=draft.income_type==='direct';
    const clean = {
      employee_id:draft.employee_id, full_name:draft.full_name, month:firstOfMonth(draft.month),
      client_project:draft.client_project||null,
      hours:isDir?1:Number(draft.hours)||0,
      rate:isDir?Number(draft.direct_income)||0:Number(draft.rate)||0,
      remarks:draft.remarks||null,
    };
    const withType={...clean,income_type:draft.income_type||'hourly'};
    let error;
    if (draft.id) {
      ({error}=await db.from('employee_timesheets').update(withType).eq('id',draft.id));
      if (error&&(error.message||'').includes('income_type')) ({error}=await db.from('employee_timesheets').update(clean).eq('id',draft.id));
    } else {
      ({error}=await db.from('employee_timesheets').upsert(withType,{onConflict:'employee_id,month,client_project'}));
      if (error&&(error.message||'').includes('income_type')) ({error}=await db.from('employee_timesheets').upsert(clean,{onConflict:'employee_id,month,client_project'}));
    }
    if (error) return alert(error.message);
    setDraft(null); load();
  };
  const remove = async (id)=>{ if(!window.confirm('Delete?'))return; await db.from('employee_timesheets').delete().eq('id',id); load(); };
  const isDirect=draft&&draft.income_type==='direct';

  return (
    <div style={S.card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderBottom:'1px solid #e2e8f0',background:'#f8fafc'}}>
        <div>
          <div style={{fontWeight:800,fontSize:'14px'}}>Timesheets — Income</div>
          <div style={{fontSize:'12px',color:'#64748b'}}>{rows.length} entries · Total AED {fmt(totalIncome)}</div>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          {!hideExportButton && <button style={S.btnExp} onClick={()=>exportCSV(filtered,'timesheets',csvCols)}>Export CSV</button>}
          <button style={S.btnPri} onClick={blank}>+ Add</button>
        </div>
      </div>

      <FilterBar fields={filterFields} values={filters} onChange={setFilters} onClear={()=>setFilters({})} />

      {draft && (
        <div style={{padding:'14px 18px',borderBottom:'1px solid #e2e8f0',background:'#fffbeb'}}>
          <div style={{marginBottom:'10px'}}>
            <label style={S.label}>Employee</label>
            <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
              onChange={(id,name)=>setDraft(d=>({...d,employee_id:id,full_name:name}))} />
          </div>
          <div style={{marginBottom:'12px'}}>
            <label style={S.label}>Income Entry Mode</label>
            <div style={{display:'flex',gap:'10px'}}>
              {[['hourly','Hours × Rate'],['direct','Direct Amount']].map(([val,lbl])=>(
                <label key={val} style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',
                  background:draft.income_type===val?'#0f172a':'#f1f5f9',color:draft.income_type===val?'#fff':'#475569',
                  border:'1px solid '+(draft.income_type===val?'#0f172a':'#cbd5e1'),
                  borderRadius:'8px',padding:'8px 14px',fontWeight:700,fontSize:'12.5px'}}>
                  <input type="radio" name="income_type" value={val} checked={draft.income_type===val}
                    onChange={()=>setDraft(d=>({...d,income_type:val}))} style={{display:'none'}} />{lbl}
                </label>
              ))}
            </div>
          </div>
          {isDirect ? (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr',gap:'10px',marginBottom:'10px'}}>
              <div><label style={S.label}>Month</label><input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Total Income (AED)</label><input type="number" step="0.01" value={draft.direct_income||''} onChange={e=>setDraft(d=>({...d,direct_income:e.target.value}))} style={{...S.input,width:'100%'}} autoFocus/></div>
              <div><label style={S.label}>Client / Project</label><input value={draft.client_project||''} onChange={e=>setDraft(d=>({...d,client_project:e.target.value}))} style={{...S.input,width:'100%'}} /></div>
            </div>
          ) : (
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'8px'}}>
                <div><label style={S.label}>Month</label><input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Client / Project</label><input value={draft.client_project||''} onChange={e=>setDraft(d=>({...d,client_project:e.target.value}))} style={{...S.input,width:'100%'}} /></div>
                <div><label style={S.label}>Hours</label><input type="number" value={draft.hours||''} onChange={e=>setDraft(d=>({...d,hours:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Rate (AED/hr)</label><input type="number" step="0.001" value={draft.rate||''} onChange={e=>setDraft(d=>({...d,rate:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
              {draft.hours&&draft.rate&&<div style={{marginBottom:'8px',fontSize:'12px',color:'#166534',fontWeight:700}}>= AED {fmt(Number(draft.hours)*Number(draft.rate))}</div>}
            </>
          )}

// Per employee/month: log hours per project worked → generate invoice (docx) →
// record actual AED received from client → auto-split SATCO vs Employee share →
// record WPS amount actually paid to employee → track recoverable/recovered balance,
// recovered progressively over future months. Recovery rows feed the same
// employee_other_costs recoverable pool used on the main P&L Dashboard.

function genInvoiceNumber() {
  const d = new Date();
  return `ST/${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
}

function numberToWordsAED(amount) {
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function chunk(n){
    let s='';
    if(n>=100){s+=ones[Math.floor(n/100)]+' Hundred ';n%=100;}
    if(n>=20){s+=tens[Math.floor(n/10)]+' ';n%=10;}
    if(n>0) s+=ones[n]+' ';
    return s;
  }
  const whole=Math.floor(amount);
  const fils=Math.round((amount-whole)*100);
  if (whole===0 && fils===0) return 'Zero Dirhams';
  let n=whole, words='', scaleIdx=0;
  const scales=['','Thousand','Million','Billion'];
  const parts=[];
  if (n===0) parts.push('Zero');
  while(n>0){ const c=n%1000; if(c>0) parts.unshift(chunk(c)+scales[scaleIdx]+' '); n=Math.floor(n/1000); scaleIdx++; }
  words = parts.join('').trim();
  let out = words+' Dirhams';
  if (fils>0) out += ' and '+chunk(fils).trim()+' Fils';
  return out;
}

// Decode a base64 string into a Uint8Array (browser-safe, no Buffer dependency).
function base64ToUint8Array(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function generateBrunelInvoiceDocx(inv, lines) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType,
          BorderStyle, WidthType, ShadingType, VerticalAlign, ImageRun, Header, Footer } = window.docx;

  const currency = inv.currency || 'EUR';
  const currencyLabel = currency; // used in column headers, e.g. "Unit Rate (EUR)"
  const isAed = currency === 'AED';

  const totalHours = lines.reduce((s,l)=>s+(Number(l.hours)||0),0);
  const totalCcy   = lines.reduce((s,l)=>s+(Number(l.hours)||0)*(Number(l.rate_eur_hr)||inv.brunel_rate_eur_hr||0),0);
  const rate = isAed ? 1 : (Number(inv.invoice_exchange_rate)||0);
  const totalAed = isAed ? totalCcy : totalCcy*rate;

  const border = { style: BorderStyle.SINGLE, size: 1, color: "999999" };
  const borders = { top: border, bottom: border, left: border, right: border };
  const cellMargins = { top: 60, bottom: 60, left: 100, right: 100 };

  // Column widths sum to 10106 DXA, matching the printable content width (A4 width 11906 minus
  // 900 DXA left/right margins each). The original widths summed to 12260, overflowing the page
  // by about 1.5 inches and clipping the right-most columns when printed.
  const colWidths = [495, 3462, 824, 1072, 1236, 577, 1072, 1368];
  const tableWidth = colWidths.reduce((a,b)=>a+b,0);

  function headerCell(text, width) {
    return new TableCell({ borders, width:{size:width,type:WidthType.DXA}, shading:{fill:'E8E8E8',type:ShadingType.CLEAR}, margins:cellMargins, verticalAlign:VerticalAlign.CENTER,
      children:[new Paragraph({alignment:AlignmentType.CENTER, children:[new TextRun({text, bold:true, size:18})]})] });
  }
  function cell(text, width, opts) {
    opts = opts||{};
    return new TableCell({ borders, width:{size:width,type:WidthType.DXA}, margins:cellMargins, verticalAlign:VerticalAlign.CENTER,
      children:[new Paragraph({alignment:opts.align||AlignmentType.LEFT, children:[new TextRun({text:String(text), bold:!!opts.bold, size:18})]})] });
  }

  const lineRows = lines.map((l,i)=>{
    const r = Number(l.rate_eur_hr)||inv.brunel_rate_eur_hr||0;
    const amt = (Number(l.hours)||0)*r;
    return new TableRow({ children:[
      cell(String(i+1), colWidths[0], {align:AlignmentType.CENTER}),
      cell(l.project_name||'', colWidths[1]),
      cell(fmt2(l.hours), colWidths[2], {align:AlignmentType.CENTER}),
      cell(fmt2(r), colWidths[3], {align:AlignmentType.CENTER}),
      cell(fmt2(amt), colWidths[4], {align:AlignmentType.RIGHT}),
      cell('0%', colWidths[5], {align:AlignmentType.CENTER}),
      cell('0', colWidths[6], {align:AlignmentType.RIGHT}),
      cell(fmt2(amt), colWidths[7], {align:AlignmentType.RIGHT}),
    ]});
  });

  const totalsRow = new TableRow({ children:[
    cell('', colWidths[0]),
    cell('TOTAL', colWidths[1], {bold:true}),
    cell(fmt2(totalHours), colWidths[2], {align:AlignmentType.CENTER,bold:true}),
    cell('', colWidths[3]),
    cell(fmt2(totalCcy), colWidths[4], {align:AlignmentType.RIGHT,bold:true}),
    cell('', colWidths[5]),
    cell('-', colWidths[6], {align:AlignmentType.RIGHT,bold:true}),
    cell(fmt2(totalCcy), colWidths[7], {align:AlignmentType.RIGHT,bold:true}),
  ]});

  function infoRow(label, value, opts) {
    opts=opts||{};
    return new TableRow({ children:[
      new TableCell({ borders, width:{size:colWidths.slice(0,7).reduce((a,b)=>a+b,0),type:WidthType.DXA}, margins:cellMargins, columnSpan:7,
        children:[new Paragraph({alignment:AlignmentType.RIGHT, children:[new TextRun({text:label, bold:true, size:18})]})] }),
      new TableCell({ borders, width:{size:colWidths[7],type:WidthType.DXA}, margins:cellMargins,
        children:[new Paragraph({alignment:AlignmentType.RIGHT, children:[new TextRun({text:value, bold:!!opts.bold, size:18})]})] }),
    ]});
  }

  function rowLine(label, value) {
    return new Paragraph({ children:[ new TextRun({text:label+': ', bold:true, size:18}), new TextRun({text:String(value), size:18}) ] });
  }

  // Letterhead header/footer images (full-width banner), embedded from the company letterhead.
  const headerImage = new ImageRun({
    type: 'png',
    data: base64ToUint8Array(LETTERHEAD_HEADER_B64),
    transformation: { width: 540, height: 59 },
    altText: { title: 'SATCO Letterhead', description: 'SATCO Arabia General Contracting letterhead', name: 'Letterhead Header' },
  });
  const footerImage = new ImageRun({
    type: 'png',
    data: base64ToUint8Array(LETTERHEAD_FOOTER_B64),
    transformation: { width: 540, height: 37 },
    altText: { title: 'SATCO Footer', description: 'SATCO Arabia General Contracting contact footer', name: 'Letterhead Footer' },
  });

  const doc = new Document({
    styles: { default: { document: { run: { font:'Arial', size:20 } } } },
    sections: [{
      properties: { page: { size:{width:11906,height:16838}, margin:{top:1500,right:900,bottom:1200,left:900,header:500,footer:400} } },
      headers: { default: new Header({ children: [ new Paragraph({ alignment:AlignmentType.CENTER, children:[headerImage] }) ] }) },
      footers: { default: new Footer({ children: [ new Paragraph({ alignment:AlignmentType.CENTER, children:[footerImage] }) ] }) },
      children: [
        new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:120,after:300},
          children:[ new TextRun({ text:'TAX INVOICE — EXPORT SERVICES', bold:true, size:26 }) ] }),

        new Table({ width:{size:tableWidth,type:WidthType.DXA}, columnWidths:[5200, 5460], rows:[
          new TableRow({ children:[
            new TableCell({ borders, width:{size:5200,type:WidthType.DXA}, margins:cellMargins,
              children:[
                new Paragraph({children:[new TextRun({text:'Project Location: '+(inv.project_location||''), size:18})]}),
                new Paragraph({children:[new TextRun({text:'', size:8})]}),
                new Paragraph({children:[new TextRun({text:'Customer:', bold:true, size:18})]}),
                new Paragraph({children:[new TextRun({text:inv.client_name||'', bold:true, size:18})]}),
                new Paragraph({children:[new TextRun({text:inv.client_address_line1||'', size:18})]}),
                new Paragraph({children:[new TextRun({text:inv.client_address_line2||'', size:18})]}),
                new Paragraph({children:[new TextRun({text:inv.client_address_line3||'', size:18})]}),
              ] }),
            new TableCell({ borders, width:{size:5460,type:WidthType.DXA}, margins:cellMargins,
              children: isAed ? [
                rowLine('Invoice #', inv.invoice_number||''),
                rowLine('Invoice Date', inv.invoice_date||''),
                rowLine('Invoice period', monthStr(inv.month)),
                rowLine('PO Reference', inv.po_reference||''),
                rowLine('Currency', 'AED'),
              ] : [
                rowLine('Invoice #', inv.invoice_number||''),
                rowLine('Invoice Date', inv.invoice_date||''),
                rowLine('Invoice period', monthStr(inv.month)),
                rowLine('PO Reference', inv.po_reference||''),
                rowLine('Exchange Rate', '1 '+currency+' = '+fmt4(rate)+' AED'),
              ] }),
          ]}),
        ]}),

        new Paragraph({ spacing:{before:240,after:60}, children:[new TextRun({text:'Subject: Invoice for PCM Support Work', bold:true, size:20})] }),
        new Paragraph({ spacing:{after:200}, children:[new TextRun({text:`Please find the below description of PCM support services for the month of ${monthStr(inv.month)}`, size:18})] }),

        new Table({ width:{size:tableWidth,type:WidthType.DXA}, columnWidths:colWidths, rows:[
          new TableRow({ children:[
            headerCell('Sl.No.', colWidths[0]), headerCell('Description', colWidths[1]), headerCell('QTY(HRS)', colWidths[2]),
            headerCell(`Unit Rate (${currencyLabel})`, colWidths[3]), headerCell(`Taxable Amount (${currencyLabel})`, colWidths[4]),
            headerCell('VAT %', colWidths[5]), headerCell(`VAT Amount (${currencyLabel})`, colWidths[6]), headerCell(`Amount Incl. VAT (${currencyLabel})`, colWidths[7]),
          ]}),
          ...lineRows,
          totalsRow,
        ]}),

        new Table({ width:{size:tableWidth,type:WidthType.DXA}, columnWidths:[colWidths.slice(0,7).reduce((a,b)=>a+b,0), colWidths[7]], rows: isAed ? [
          infoRow(`Gross Taxable Amount (${currencyLabel})`, fmt2(totalCcy)),
          infoRow(`VAT Amount (${currencyLabel})`, '-'),
          infoRow(`Total Amount Incl. VAT (${currencyLabel})`, fmt2(totalCcy), {bold:true}),
        ] : [
          infoRow(`Gross Taxable Amount (${currencyLabel})`, fmt2(totalCcy)),
          infoRow(`VAT Amount (${currencyLabel})`, '-'),
          infoRow(`Total Taxable Amount (${currencyLabel})`, fmt2(totalCcy), {bold:true}),
          infoRow('Gross Taxable Amount (AED)', fmt2(totalAed)),
          infoRow('VAT Amount (AED)', '-'),
          infoRow('Total Amount Incl. VAT (AED)', fmt2(totalAed), {bold:true}),
        ]}),

        new Paragraph({ spacing:{before:200,after:60}, children:[new TextRun({text:'Amount in words (AED): '+numberToWordsAED(totalAed), bold:true, size:18})] }),
        new Paragraph({ spacing:{after:200}, children:[new TextRun({text:'Payment Mode: 7 Days from Invoice Submission date', size:18})] }),

        new Paragraph({ spacing:{before:200,after:60}, children:[new TextRun({text:'OUR BANK DETAILS:', bold:true, size:18})] }),
        new Paragraph({ children:[new TextRun({text:'ACCOUNT TITLE: SATCO ARABIA GENERAL CONTRACTING -L.L.C-S.P.C', size:18})] }),
        new Paragraph({ children:[new TextRun({text:'ACCOUNT NUMBER: 90020200014786   IBAN NO: AE170110090020200014786', size:18})] }),
        new Paragraph({ children:[new TextRun({text:'BANK NAME: BANK OF BARODA', size:18})] }),
        new Paragraph({ spacing:{after:300}, children:[new TextRun({text:'TRN: 105042029600003', size:18})] }),

        new Paragraph({ spacing:{before:300}, children:[new TextRun({text:'Best regards,', size:18})] }),
        new Paragraph({ spacing:{after:60}, children:[new TextRun({text:'General Manager', bold:true, size:18})] }),
        new Paragraph({ children:[new TextRun({text:'Computer generated invoice — no original signature or stamp required.', italics:true, size:16})] }),
      ],
    }],
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Invoice_${(inv.invoice_number||'draft').replace(/\//g,'-')}_${inv.full_name||''}_${monthStr(inv.month)}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

const fmt2 = (n)=> (Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt4 = (n)=> (Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:4,maximumFractionDigits:4});

// Client billing can be invoiced in AED, EUR, USD, GBP, or a custom code.
// currencySymbol() gives a compact symbol for inline display; currency codes are used in documents.
const BILLING_CURRENCIES = ['AED','EUR','USD','GBP'];
function currencySymbol(code) {
  const map = { AED:'AED ', EUR:'€', USD:'$', GBP:'£' };
  return map[code] || (code ? code+' ' : '');
}

function ClientBillingTab({ employees, initialFilter, hideEmpFilter }) {
  const [invoices, setInvoices]   = useState([]);
  const [linesMap, setLinesMap]   = useState({});       // invoice_id -> [lines]
  const [recoveries, setRecoveries] = useState([]);
  const [syncedRecovery, setSyncedRecovery] = useState({}); // invoice_id -> {amount, recovered_amount} from employee_other_costs (P&L Dashboard's source of truth)
  const [loading, setLoading]     = useState(true);
  const [filters, setFilters]     = useState(initialFilter||{});
  const [draft, setDraft]         = useState(null);      // invoice header being edited
  const [draftLines, setDraftLines] = useState([]);       // line items for draft
  const [expandedId, setExpandedId] = useState(null);
  const [recDraft, setRecDraft]   = useState(null);       // recovery entry being added
  useEffect(()=>{ if (initialFilter) setFilters(initialFilter); },[initialFilter&&initialFilter.employee_id]);

  // One-time auto-repair: recompute each invoice's overpayment from its own saved data and
  // correct (or create) the matching employee_other_costs recovery row if it's missing or
  // out of sync — this is what keeps Client Billing's Recovery Status and the P&L Dashboard
  // showing the same number without requiring the user to re-open and re-save every invoice.
  const autoRepairSync = async (invList, linesByInvoice, syncMap) => {
    const fixes = [];
    for (const inv of invList) {
      const lns = linesByInvoice[inv.id]||[];
      const hours = lns.reduce((s,l)=>s+(Number(l.hours)||0),0);
      const totalCcy = lns.reduce((s,l)=>s+(Number(l.hours)||0)*(Number(l.rate_eur_hr)||inv.brunel_rate_eur_hr||0),0);
      const received = Number(inv.received_amount_aed)||0;
      const wps = Number(inv.wps_paid_aed)||0;
      if (!received || !totalCcy || !wps) continue;
      const impliedRate = received/totalCcy;
      const satcoAed = hours*(Number(inv.satco_rate_eur_hr)||4.5)*impliedRate;
      const empShare = received-satcoAed;
      const overpaid = wps-empShare;
      const synced = syncMap[inv.id];
      if (overpaid > 0.5) {
        const roundedAmt = Math.round(overpaid*100)/100;
        if (!synced) {
          fixes.push(db.from('employee_other_costs').insert({
            employee_id:inv.employee_id, full_name:inv.full_name, cost_type:'wps_overpayment_recovery',
            cost_date:inv.wps_paid_date||inv.month||new Date().toISOString().slice(0,10),
            amount:roundedAmt, recoverable:true, recovered_amount:0,
            notes:`WPS overpaid vs employee's actual share for ${monthStr(inv.month)} [INV:${inv.id}]`,
          }));
        } else if (Math.abs(synced.amount-roundedAmt) > 0.5) {
          fixes.push(db.from('employee_other_costs').update({ amount:roundedAmt }).eq('employee_id',inv.employee_id).eq('cost_type','wps_overpayment_recovery').ilike('notes', `%[INV:${inv.id}]%`));
        }
      }
    }
    if (fixes.length) await Promise.all(fixes);
    return fixes.length;
  };

  const load = async () => {
    setLoading(true);
    const [inv, lns, rec, oc] = await Promise.all([
      db.from('employee_client_invoices').select('*').order('month',{ascending:false}),
      db.from('employee_client_invoice_lines').select('*').order('sort_order',{ascending:true}),
      db.from('employee_client_recoveries').select('*').order('recovery_month',{ascending:false}),
      db.from('employee_other_costs').select('id,amount,recovered_amount,notes').eq('cost_type','wps_overpayment_recovery'),
    ]);
    const invData = inv.data||[];
    if (!inv.error) setInvoices(invData);
    let linesByInvoice = {};
    if (!lns.error) {
      (lns.data||[]).forEach(l=>{ if(!linesByInvoice[l.invoice_id]) linesByInvoice[l.invoice_id]=[]; linesByInvoice[l.invoice_id].push(l); });
      setLinesMap(linesByInvoice);
    }
    if (!rec.error) setRecoveries(rec.data||[]);
    // Map each synced employee_other_costs recovery row back to its invoice id, parsed from the [INV:id] tag in notes.
    let syncMap = {};
    if (!oc.error) {
      (oc.data||[]).forEach(r=>{
        const match = String(r.notes||'').match(/\[INV:([^\]]+)\]/);
        if (match) syncMap[match[1]] = { amount:Number(r.amount)||0, recovered:Number(r.recovered_amount)||0 };
      });
      setSyncedRecovery(syncMap);
    }
    setLoading(false);

    // Auto-repair runs silently in the background after the page has rendered; if it fixes
    // anything, refresh the synced map once more so the table reflects the corrected values.
    if (!inv.error && !lns.error && !oc.error) {
      const fixedCount = await autoRepairSync(invData, linesByInvoice, syncMap);
      if (fixedCount > 0) {
        const { data: ocFresh } = await db.from('employee_other_costs').select('id,amount,recovered_amount,notes').eq('cost_type','wps_overpayment_recovery');
        const freshMap = {};
        (ocFresh||[]).forEach(r=>{
          const match = String(r.notes||'').match(/\[INV:([^\]]+)\]/);
          if (match) freshMap[match[1]] = { amount:Number(r.amount)||0, recovered:Number(r.recovered_amount)||0 };
        });
        setSyncedRecovery(freshMap);
      }
    }
  };
  useEffect(()=>{load();},[]);

  const filterFields = [
    ...(hideEmpFilter?[]:[{key:'employee_id', label:'Emp ID',  width:'100px'},{key:'full_name',label:'Name',width:'150px'}]),
    {key:'client_name', label:'Client', width:'180px'},
    {key:'invoice_number', label:'Invoice #', width:'140px'},
  ];
  const filtered = useMemo(()=>applyFilters(invoices,filters),[invoices,filters]);
  const grouped  = useMemo(()=>groupByMonth(filtered,'month'),[filtered]);

  const blank = () => {
    setDraft({
      employee_id: initialFilter&&initialFilter.employee_id||'', full_name: initialFilter&&initialFilter.full_name||'',
      month:'', client_name:'Brunel Energy Europe B.V. SUCURSAL EN ESPANA',
      client_address_line1:'Calle General Moscrado 1, 2nd floor', client_address_line2:'28020 MADRID', client_address_line3:'Spain. W00331621',
      project_location:'Netherlands', po_reference:'', invoice_number:genInvoiceNumber(), invoice_date:new Date().toISOString().slice(0,10),
      currency:'EUR', invoice_exchange_rate:'', satco_rate_eur_hr:4.5, brunel_rate_eur_hr:57,
      received_amount_aed:'', received_date:'', received_exchange_rate:'',
      wps_paid_aed:'', wps_paid_date:'', remarks:'',
    });
    setDraftLines([{project_name:'', hours:'', rate_eur_hr:''}]);
  };

  const openEdit = (inv) => {
    setDraft({...inv, month:monthStr(inv.month), currency:inv.currency||'EUR'});
    const lns = linesMap[inv.id]||[];
    setDraftLines(lns.length? lns.map(l=>({...l})) : [{project_name:'', hours:'', rate_eur_hr:''}]);
  };

  const addLine = ()=>setDraftLines(d=>[...d,{project_name:'',hours:'',rate_eur_hr:''}]);
  const removeLine = (i)=>setDraftLines(d=>d.filter((_,idx)=>idx!==i));
  const updateLine = (i,key,val)=>setDraftLines(d=>d.map((l,idx)=>idx===i?{...l,[key]:val}:l));

  const totalHoursDraft = draftLines.reduce((s,l)=>s+(Number(l.hours)||0),0);
  const totalEurDraft   = draftLines.reduce((s,l)=>s+(Number(l.hours)||0)*(Number(l.rate_eur_hr)||Number(draft&&draft.brunel_rate_eur_hr)||0),0);
  const invoiceAedDraft = totalEurDraft*(Number(draft&&draft.invoice_exchange_rate)||0);

  // Split calc: SATCO share = hours * satco_rate_eur_hr * (AED received / EUR invoiced)
  const splitCalc = useMemo(()=>{
    if (!draft) return null;
    const received = Number(draft.received_amount_aed)||0;
    if (!received || !totalEurDraft) return null;
    const impliedRate = received/totalEurDraft;
    const satcoEur = totalHoursDraft*(Number(draft.satco_rate_eur_hr)||4.5);
    const satcoAed = satcoEur*impliedRate;
    const paavanAed = received-satcoAed;
    return { impliedRate, satcoAed, paavanAed };
  },[draft, totalHoursDraft, totalEurDraft]);

  const wpsDeltaDraft = useMemo(()=>{
    if (!draft || !splitCalc) return null;
    const wps = Number(draft.wps_paid_aed)||0;
    if (!wps) return null;
    return wps - splitCalc.paavanAed; // positive = overpaid, needs recovery
  },[draft, splitCalc]);

  const save = async () => {
    if (!draft.employee_id||!draft.month) return alert('Employee ID and month are required');
    if (draftLines.every(l=>!l.project_name && !l.hours)) return alert('Add at least one project line');

    const received = draft.received_amount_aed!==''&&draft.received_amount_aed!=null ? Number(draft.received_amount_aed) : null;
    const computedImpliedRate = (received && totalEurDraft) ? received/totalEurDraft : (draft.received_exchange_rate?Number(draft.received_exchange_rate):null);

    const clean = {
      employee_id:draft.employee_id, full_name:draft.full_name, month:firstOfMonth(draft.month),
      client_name:draft.client_name||null, client_address_line1:draft.client_address_line1||null,
      client_address_line2:draft.client_address_line2||null, client_address_line3:draft.client_address_line3||null,
      project_location:draft.project_location||null, po_reference:draft.po_reference||null,
      invoice_number:draft.invoice_number||null, invoice_date:draft.invoice_date||null,
      currency:draft.currency||'EUR',
      invoice_exchange_rate:Number(draft.invoice_exchange_rate)||null,
      satco_rate_eur_hr:Number(draft.satco_rate_eur_hr)||4.5, brunel_rate_eur_hr:Number(draft.brunel_rate_eur_hr)||57,
      received_amount_aed:received, received_date:draft.received_date||null,
      received_exchange_rate:computedImpliedRate,
      wps_paid_aed:draft.wps_paid_aed!==''&&draft.wps_paid_aed!=null?Number(draft.wps_paid_aed):null,
      wps_paid_date:draft.wps_paid_date||null,
      remarks:draft.remarks||null, updated_at:new Date().toISOString(),
    };

    let invoiceId = draft.id;
    let error;
    if (draft.id) {
      ({error} = await db.from('employee_client_invoices').update(clean).eq('id',draft.id));
    } else {
      const res = await db.from('employee_client_invoices').insert(clean).select('id').single();
      error = res.error; invoiceId = res.data && res.data.id;
    }
    if (error) return alert(error.message);

    // Replace line items
    await db.from('employee_client_invoice_lines').delete().eq('invoice_id',invoiceId);
    const linesToInsert = draftLines.filter(l=>l.project_name||l.hours).map((l,i)=>({
      invoice_id:invoiceId, project_name:l.project_name||'', hours:Number(l.hours)||0,
      rate_eur_hr:l.rate_eur_hr?Number(l.rate_eur_hr):null, sort_order:i,
    }));
    if (linesToInsert.length) {
      const {error:lerr} = await db.from('employee_client_invoice_lines').insert(linesToInsert);
      if (lerr) return alert('Saved invoice but line items failed: '+lerr.message);
    }

    // Sync recoverable WPS overpayment into the shared P&L recovery pool (employee_other_costs).
    // Updated in place (never delete+recreate) so any recovered_amount already logged against
    // this invoice is preserved — recreating the row used to silently reset progress to zero.
    if (splitCalc) {
      const wps = Number(draft.wps_paid_aed)||0;
      const overpaid = wps - splitCalc.paavanAed;
      const { data: existing } = await db.from('employee_other_costs').select('id,recovered_amount').eq('employee_id',draft.employee_id).eq('cost_type','wps_overpayment_recovery').ilike('notes', `%[INV:${invoiceId}]%`);
      const existingRow = existing && existing[0];
      if (overpaid > 0.5) {
        const payload = {
          employee_id:draft.employee_id, full_name:draft.full_name,
          cost_type:'wps_overpayment_recovery', cost_date:draft.wps_paid_date||draft.month||new Date().toISOString().slice(0,10),
          amount:Math.round(overpaid*100)/100, recoverable:true,
          notes:`WPS overpaid vs employee's actual share for ${monthStr(draft.month)} [INV:${invoiceId}]`,
        };
        if (existingRow) {
          await db.from('employee_other_costs').update(payload).eq('id',existingRow.id);
        } else {
          await db.from('employee_other_costs').insert({...payload, recovered_amount:0});
        }
      } else if (existingRow) {
        // No longer overpaid (e.g. WPS amount corrected) — remove the stale recovery row.
        await db.from('employee_other_costs').delete().eq('id',existingRow.id);
      }
    }

    setDraft(null); setDraftLines([]); load();
  };

  const remove = async (id) => {
    if (!window.confirm('Delete this invoice and its line items / linked recovery?')) return;
    await db.from('employee_client_invoice_lines').delete().eq('invoice_id',id);
    await db.from('employee_client_recoveries').delete().eq('invoice_id',id);
    const { data: existing } = await db.from('employee_other_costs').select('id').ilike('notes', `%[INV:${id}]%`);
    if (existing && existing.length) await db.from('employee_other_costs').delete().in('id', existing.map(e=>e.id));
    await db.from('employee_client_invoices').delete().eq('id',id);
    load();
  };

  const downloadDocx = async (inv) => {
    const lns = linesMap[inv.id]||[];
    if (!lns.length) return alert('No line items saved for this invoice yet.');
    if ((inv.currency||'EUR')!=='AED' && !inv.invoice_exchange_rate) { if(!window.confirm('No invoice exchange rate set — AED totals on the document will show as 0. Continue?')) return; }
    await generateBrunelInvoiceDocx(inv, lns);
  };

  // Recovery ledger per employee (for the linked invoice's overpayment)
  const recoveryForEmployee = (employeeId) => recoveries.filter(r=>r.employee_id===employeeId);
  const recoveredTotal = (employeeId) => recoveryForEmployee(employeeId).reduce((s,r)=>s+(Number(r.amount_aed)||0),0);
  // Ledger entries scoped to a single invoice (matches what's actually linked via invoice_id) —
  // used so the recovery ledger shown under each invoice doesn't bleed in other invoices' recoveries.
  const recoveryForInvoice = (invoiceId) => recoveries.filter(r=>r.invoice_id===invoiceId);

  const saveRecovery = async () => {
    if (!recDraft.employee_id||!recDraft.recovery_month||!recDraft.amount_aed) return alert('Employee, month and amount required');
    const { error } = await db.from('employee_client_recoveries').insert({
      invoice_id:recDraft.invoice_id||null, employee_id:recDraft.employee_id,
      recovery_month:firstOfMonth(recDraft.recovery_month), amount_aed:Number(recDraft.amount_aed)||0, remarks:recDraft.remarks||null,
    });
    if (error) return alert(error.message);
    // Update recovered_amount on the linked employee_other_costs recoverable row
    if (recDraft.invoice_id) {
      const { data: existing } = await db.from('employee_other_costs').select('id,recovered_amount').eq('employee_id',recDraft.employee_id).ilike('notes', `%[INV:${recDraft.invoice_id}]%`);
      if (existing && existing.length) {
        const row = existing[0];
        await db.from('employee_other_costs').update({ recovered_amount: (Number(row.recovered_amount)||0)+Number(recDraft.amount_aed) }).eq('id',row.id);
      }
    }
    setRecDraft(null); load();
  };
  const removeRecovery = async (id, invoiceId, employeeId, amount) => {
    if (!window.confirm('Delete this recovery entry?')) return;
    await db.from('employee_client_recoveries').delete().eq('id',id);
    if (invoiceId) {
      const { data: existing } = await db.from('employee_other_costs').select('id,recovered_amount').eq('employee_id',employeeId).ilike('notes', `%[INV:${invoiceId}]%`);
      if (existing && existing.length) {
        const row = existing[0];
        await db.from('employee_other_costs').update({ recovered_amount: Math.max(0,(Number(row.recovered_amount)||0)-Number(amount)) }).eq('id',row.id);
      }
    }
    load();
  };

  const totalReceived = filtered.reduce((s,r)=>s+(Number(r.received_amount_aed)||0),0);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={S.card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderBottom:'1px solid #e2e8f0',background:'#f8fafc',flexWrap:'wrap',gap:'10px'}}>
          <div>
            <div style={{fontWeight:800,fontSize:'14px'}}>Client Hourly Billing — Invoice, Receipt Split &amp; WPS Recovery</div>
            <div style={{fontSize:'12px',color:'#64748b'}}>{filtered.length} invoice(s) · Received AED {fmt2(totalReceived)}</div>
          </div>
          <button style={S.btnPri} onClick={blank}>+ New Invoice / Month</button>
        </div>
        <FilterBar fields={filterFields} values={filters} onChange={setFilters} onClear={()=>setFilters({})} />

        {draft && (
          <div style={{padding:'16px 18px',borderBottom:'1px solid #e2e8f0',background:'#fffbeb'}}>
            <div style={{fontWeight:800,fontSize:'13px',marginBottom:'10px',color:'#92400e'}}>{draft.id?'Edit':'New'} Invoice</div>

            <div style={{marginBottom:'10px'}}>
              <label style={S.label}>Employee</label>
              <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
                onChange={(id,name)=>setDraft(d=>({...d,employee_id:id,full_name:name}))} />
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'10px'}}>
              <div><label style={S.label}>Month</label><input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Invoice Number</label><input value={draft.invoice_number||''} onChange={e=>setDraft(d=>({...d,invoice_number:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Invoice Date</label><input type="date" value={draft.invoice_date||''} onChange={e=>setDraft(d=>({...d,invoice_date:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>PO Reference</label><input value={draft.po_reference||''} onChange={e=>setDraft(d=>({...d,po_reference:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:'10px',marginBottom:'10px'}}>
              <div><label style={S.label}>Client Name</label><input value={draft.client_name||''} onChange={e=>setDraft(d=>({...d,client_name:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Project Location</label><input value={draft.project_location||''} onChange={e=>setDraft(d=>({...d,project_location:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Billing Currency</label>
                <select value={draft.currency||'EUR'} onChange={e=>setDraft(d=>({...d,currency:e.target.value}))} style={{...S.input,width:'100%'}}>
                  {BILLING_CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
              <div><label style={S.label}>Client Rate ({draft.currency||'EUR'}/hr)</label><input type="number" step="0.01" value={draft.brunel_rate_eur_hr} onChange={e=>setDraft(d=>({...d,brunel_rate_eur_hr:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>SATCO Rate ({draft.currency||'EUR'}/hr)</label><input type="number" step="0.01" value={draft.satco_rate_eur_hr} onChange={e=>setDraft(d=>({...d,satco_rate_eur_hr:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'14px'}}>
              <div><label style={S.label}>Client Address Line 1</label><input value={draft.client_address_line1||''} onChange={e=>setDraft(d=>({...d,client_address_line1:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Client Address Line 2</label><input value={draft.client_address_line2||''} onChange={e=>setDraft(d=>({...d,client_address_line2:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Client Address Line 3</label><input value={draft.client_address_line3||''} onChange={e=>setDraft(d=>({...d,client_address_line3:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            </div>

            <div style={{background:'#fff',border:'1px solid #cbd5e1',borderRadius:'8px',padding:'12px 14px',marginBottom:'12px'}}>
              <div style={{fontWeight:700,fontSize:'12.5px',marginBottom:'8px',color:'#0f172a'}}>Projects Worked This Month (hours per project)</div>
              <div style={{overflowX:'auto'}}>
              <div style={{minWidth:'560px'}}>
              <div style={{display:'grid',gridTemplateColumns:'3fr 90px 110px 110px 28px',gap:'8px',marginBottom:'4px',padding:'0 2px'}}>
                <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase'}}>Project</div>
                <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase'}}>Hours</div>
                <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase'}}>Rate</div>
                <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase'}}>Amount</div>
                <div></div>
              </div>
              {draftLines.map((l,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'3fr 90px 110px 110px 28px',gap:'8px',marginBottom:'6px',alignItems:'center'}}>
                  <input placeholder="Project name (e.g. 3130 CK5Y Tisza PFHE)" value={l.project_name||''} onChange={e=>updateLine(i,'project_name',e.target.value)} style={{...S.input,width:'100%'}}/>
                  <input type="number" placeholder="Hours" value={l.hours||''} onChange={e=>updateLine(i,'hours',e.target.value)} style={{...S.input,width:'100%'}}/>
                  <input type="number" step="0.01" placeholder={`${draft.brunel_rate_eur_hr||57}`} value={l.rate_eur_hr||''} onChange={e=>updateLine(i,'rate_eur_hr',e.target.value)} style={{...S.input,width:'100%'}}/>
                  <div style={{fontSize:'12px',fontWeight:700,color:'#166534',whiteSpace:'nowrap'}}>{currencySymbol(draft.currency)}{fmt2((Number(l.hours)||0)*(Number(l.rate_eur_hr)||Number(draft.brunel_rate_eur_hr)||0))}</div>
                  <button onClick={()=>removeLine(i)} style={S.iconBtn}>&#128465;</button>
                </div>
              ))}
              </div>
              </div>
              <button onClick={addLine} style={{...S.btnPri,background:'#fff',color:'#0f172a',border:'1px solid #cbd5e1',fontSize:'12px',padding:'6px 12px',marginTop:'4px'}}>+ Add Project Line</button>
              <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #e2e8f0',fontSize:'13px'}}>
                Total Hours: <strong>{fmt2(totalHoursDraft)}</strong> &nbsp;·&nbsp; Total Invoice: <strong style={{color:'#166534'}}>{currencySymbol(draft.currency)}{fmt2(totalEurDraft)}</strong>
              </div>
            </div>

            {(draft.currency||'EUR')!=='AED' && (
            <div style={{background:'#eff6ff',border:'1px solid #93c5fd',borderRadius:'8px',padding:'12px 14px',marginBottom:'12px'}}>
              <div style={{fontWeight:700,fontSize:'12.5px',marginBottom:'8px',color:'#1d4ed8'}}>Invoice Exchange Rate (1 {draft.currency||'EUR'} = ? AED — as quoted on invoice, informational; AED on document uses this)</div>
              <input type="number" step="0.0001" placeholder="e.g. 4.2738280" value={draft.invoice_exchange_rate||''} onChange={e=>setDraft(d=>({...d,invoice_exchange_rate:e.target.value}))} style={{...S.input,width:'220px'}}/>
              {draft.invoice_exchange_rate && <div style={{marginTop:'8px',fontSize:'12.5px'}}>Invoiced AED equivalent (informational): <strong>AED {fmt2(invoiceAedDraft)}</strong></div>}
            </div>
            )}

            <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'8px',padding:'12px 14px',marginBottom:'12px'}}>
              <div style={{fontWeight:700,fontSize:'12.5px',marginBottom:'8px',color:'#166534'}}>Step 2 — Once Payment is Received from Client</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'8px'}}>
                <div><label style={S.label}>Amount Received (AED)</label><input type="number" step="0.01" value={draft.received_amount_aed||''} onChange={e=>setDraft(d=>({...d,received_amount_aed:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Date Received</label><input type="date" value={draft.received_date||''} onChange={e=>setDraft(d=>({...d,received_date:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
              {splitCalc && (
                <div style={{background:'#fff',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px 14px',fontSize:'12.5px'}}>
                  <div>Implied exchange rate on day of transmission: <strong>{fmt4(splitCalc.impliedRate)}</strong></div>
                  <div style={{marginTop:'4px'}}>SATCO share ({fmt2(totalHoursDraft)}h × {currencySymbol(draft.currency)}{draft.satco_rate_eur_hr||4.5} × rate): <strong style={{color:'#166534'}}>AED {fmt2(splitCalc.satcoAed)}</strong></div>
                  <div>Employee ({draft.full_name||'employee'}) share: <strong style={{color:'#1d4ed8'}}>AED {fmt2(splitCalc.paavanAed)}</strong></div>
                </div>
              )}
            </div>

            <div style={{background:'#fef3c7',border:'1px solid #fbbf24',borderRadius:'8px',padding:'12px 14px',marginBottom:'14px'}}>
              <div style={{fontWeight:700,fontSize:'12.5px',marginBottom:'8px',color:'#92400e'}}>Step 3 — WPS Payment Actually Made to Employee</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
                <div><label style={S.label}>WPS Amount Paid (AED)</label><input type="number" step="0.01" value={draft.wps_paid_aed||''} onChange={e=>setDraft(d=>({...d,wps_paid_aed:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>WPS Payment Date</label><input type="date" value={draft.wps_paid_date||''} onChange={e=>setDraft(d=>({...d,wps_paid_date:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
              {wpsDeltaDraft!==null && (
                <div style={{marginTop:'8px',fontSize:'12.5px',fontWeight:700}}>
                  {wpsDeltaDraft>0.5
                    ? <span style={{color:'#dc2626'}}>Overpaid by AED {fmt2(wpsDeltaDraft)} — this will be added to {draft.full_name||'employee'}'s recoverable balance (visible on P&L Dashboard).</span>
                    : wpsDeltaDraft<-0.5
                      ? <span style={{color:'#dc2626'}}>Underpaid by AED {fmt2(Math.abs(wpsDeltaDraft))} vs employee's actual share.</span>
                      : <span style={{color:'#166534'}}>WPS payment matches employee's share.</span>}
                </div>
              )}
            </div>

            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>Remarks</label>
              <input value={draft.remarks||''} onChange={e=>setDraft(d=>({...d,remarks:e.target.value}))} style={{...S.input,width:'100%'}}/>
            </div>

            <div style={{display:'flex',gap:'8px'}}>
              <button style={S.btnPri} onClick={save}>Save Invoice</button>
              <button style={{...S.btnPri,background:'#fff',color:'#475569',border:'1px solid #cbd5e1'}} onClick={()=>{setDraft(null);setDraftLines([]);}}>Cancel</button>
            </div>
          </div>
        )}

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12.5px'}}>
            <thead><tr>{(hideEmpFilter?['Month','Invoice #','Projects','Hours','Invoiced','Received AED','SATCO Share','Employee Share','WPS Paid','Recovery Status','']:['Emp ID','Name','Month','Invoice #','Projects','Hours','Invoiced','Received AED','SATCO Share','Employee Share','WPS Paid','Recovery Status','']).map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {loading
                ? <tr><td colSpan={hideEmpFilter?11:13} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>Loading…</td></tr>
                : grouped.length===0
                  ? <tr><td colSpan={hideEmpFilter?11:13} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>No invoices yet — click "+ New Invoice / Month" to start.</td></tr>
                  : grouped.map(g=>(
                    <React.Fragment key={g.month}>
                      {!hideEmpFilter && <MonthGroup month={g.month} count={g.rows.length} colSpan={13} />}
                      {g.rows.map(inv=>{
                        const lns = linesMap[inv.id]||[];
                        const hours = lns.reduce((s,l)=>s+(Number(l.hours)||0),0);
                        const eur = lns.reduce((s,l)=>s+(Number(l.hours)||0)*(Number(l.rate_eur_hr)||inv.brunel_rate_eur_hr||0),0);
                        const received = Number(inv.received_amount_aed)||0;
                        const impliedRate = received && eur ? received/eur : null;
                        const satcoAed = impliedRate ? hours*(Number(inv.satco_rate_eur_hr)||4.5)*impliedRate : null;
                        const empShare = satcoAed!==null ? received-satcoAed : null;
                        const wps = Number(inv.wps_paid_aed)||0;
                        const overpaid = (empShare!==null && wps) ? wps-empShare : null;
                        // Recovery Status reads the same employee_other_costs row the P&L Dashboard uses,
                        // keyed to this specific invoice via the [INV:id] tag — this keeps both views in sync.
                        const synced = syncedRecovery[inv.id];
                        const outstandingSynced = synced ? Math.max(0, synced.amount - synced.recovered) : null;
                        const recovered = synced ? synced.recovered : recoveredTotal(inv.employee_id);
                        return (
                          <React.Fragment key={inv.id}>
                            <tr className="hr-row" style={{borderTop:'1px solid #f1f5f9'}}>
                              {!hideEmpFilter && <td style={{...S.td,fontFamily:'ui-monospace,monospace',fontWeight:700,color:'#2563eb'}}>{inv.employee_id}</td>}
                              {!hideEmpFilter && <td style={{...S.td,fontWeight:600,whiteSpace:'normal'}}>{inv.full_name}</td>}
                              <td style={S.td}>{monthStr(inv.month)}</td>
                              <td style={S.td}>{inv.invoice_number||'—'}</td>
                              <td style={{...S.tdWrap,fontSize:'11.5px',color:'#64748b'}}>{lns.map(l=>l.project_name).join(', ')||'—'}</td>
                              <td style={S.td}>{fmt2(hours)}</td>
                              <td style={S.td}>{currencySymbol(inv.currency)}{fmt2(eur)}</td>
                              <td style={S.td}>{received?fmt2(received):'—'}</td>
                              <td style={{...S.td,fontWeight:700,color:'#166534'}}>{satcoAed!==null?fmt2(satcoAed):'—'}</td>
                              <td style={{...S.td,fontWeight:700,color:'#1d4ed8'}}>{empShare!==null?fmt2(empShare):'—'}</td>
                              <td style={S.td}>{wps?fmt2(wps):'—'}</td>
                              <td style={S.td}>
                                {overpaid===null ? '—' : overpaid>0.5 ? (
                                  <span style={{background:'#fef3c7',color:'#92400e',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px',whiteSpace:'nowrap'}}>
                                    {fmt2(outstandingSynced!==null ? outstandingSynced : Math.max(0,overpaid-recovered))} left
                                  </span>
                                ) : <span style={{color:'#166534',fontWeight:700,fontSize:'11px'}}>Clear</span>}
                              </td>
                              <td style={{...S.td,textAlign:'right',whiteSpace:'nowrap'}}>
                                <button style={S.iconBtn} title="Download invoice (.docx)" onClick={()=>downloadDocx(inv)}>Download</button>
                                <button style={S.iconBtn} title="Recovery ledger" onClick={()=>setExpandedId(expandedId===inv.id?null:inv.id)}>{expandedId===inv.id?'▲':'▼'}</button>
                                <button style={S.iconBtn} onClick={()=>openEdit(inv)}>&#9998;</button>
                                <button style={S.iconBtn} onClick={()=>remove(inv.id)}>&#128465;</button>
                              </td>
                            </tr>
                            {expandedId===inv.id && (
                              <tr>
                                <td colSpan={hideEmpFilter?11:13} style={{padding:'12px 18px',background:'#f8fafc',borderTop:'1px solid #e2e8f0'}}>
                                  <div style={{fontWeight:700,fontSize:'12px',marginBottom:'8px',color:'#475569'}}>Progressive WPS Recovery — {inv.full_name}</div>
                                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',marginBottom:'8px'}}>
                                    <thead><tr><th style={S.th}>Recovery Month</th><th style={S.th}>Amount (AED)</th><th style={S.th}>Remarks</th><th style={S.th}></th></tr></thead>
                                    <tbody>
                                      {recoveryForInvoice(inv.id).length===0
                                        ? <tr><td colSpan={4} style={{padding:'10px',color:'#94a3b8',textAlign:'center'}}>No recoveries logged yet</td></tr>
                                        : recoveryForInvoice(inv.id).map(r=>(
                                          <tr key={r.id} style={{borderTop:'1px solid #e2e8f0'}}>
                                            <td style={S.td}>{monthStr(r.recovery_month)}</td>
                                            <td style={{...S.td,fontWeight:700,color:'#166534'}}>{fmt2(r.amount_aed)}</td>
                                            <td style={S.tdWrap}>{r.remarks||'—'}</td>
                                            <td style={{...S.td,textAlign:'right'}}><button style={S.iconBtn} onClick={()=>removeRecovery(r.id,inv.id,inv.employee_id,r.amount_aed)}>&#128465;</button></td>
                                          </tr>
                                        ))}
                                    </tbody>
                                  </table>
                                  <div style={{fontSize:'12px',marginBottom:'8px'}}>Total recovered so far: <strong>AED {fmt2(recovered)}</strong>{overpaid!==null && <span> · Outstanding: <strong style={{color:(outstandingSynced!==null?outstandingSynced:Math.max(0,overpaid-recovered))>0.5?'#dc2626':'#166534'}}>AED {fmt2(outstandingSynced!==null ? outstandingSynced : Math.max(0,overpaid-recovered))}</strong></span>}</div>
                                  {recDraft && recDraft.invoice_id===inv.id ? (
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr auto',gap:'8px',alignItems:'end',background:'#fff',padding:'10px',borderRadius:'8px',border:'1px solid #cbd5e1'}}>
                                      <div><label style={S.label}>Month</label><input type="month" value={recDraft.recovery_month||''} onChange={e=>setRecDraft(d=>({...d,recovery_month:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                                      <div><label style={S.label}>Amount (AED)</label><input type="number" value={recDraft.amount_aed||''} onChange={e=>setRecDraft(d=>({...d,amount_aed:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                                      <div><label style={S.label}>Remarks</label><input value={recDraft.remarks||''} onChange={e=>setRecDraft(d=>({...d,remarks:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                                      <div style={{display:'flex',gap:'6px'}}>
                                        <button style={S.btnPri} onClick={saveRecovery}>Save</button>
                                        <button style={{...S.btnPri,background:'#fff',color:'#475569',border:'1px solid #cbd5e1'}} onClick={()=>setRecDraft(null)}>✕</button>
                                      </div>
                                    </div>
                                  ) : (
                                    <button style={{...S.btnPri,fontSize:'11.5px',padding:'6px 12px'}} onClick={()=>setRecDraft({invoice_id:inv.id,employee_id:inv.employee_id,recovery_month:'',amount_aed:'',remarks:''})}>+ Log Monthly Recovery</button>
                                  )}
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </React.Fragment>
                  ))
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── P&L DASHBOARD ─────────────────────────────────────────────────
function PnlDashboard({ empMeta, onOpenEmployee }) {
  const [summary,      setSummary]      = useState([]);
  const [monthly,      setMonthly]      = useState([]);
  const [deposits,     setDeposits]     = useState([]);
  const [recoverySrc,  setRecoverySrc]  = useState({visa:[],flights:[],training:[],other:[],deductions:[],invoices:[],invoiceLines:[],invoiceRecoveries:[]});
  const [loading,      setLoading]      = useState(true);
