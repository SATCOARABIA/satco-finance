function AmountTag({ value }) {
  const positive = value >= 0;
  return (
    <span style={{ fontWeight:800, color: positive ? '#166534' : '#dc2626' }}>

// ============================================================
// Generic CRUD table for the 4 simple cost tables
// ============================================================
function CostTable({ title, table, employees, fields, dateField }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState(null);

  const load = async () => {
    setLoading(true);
    const { data, error } = await db.from(table).select('*').order(dateField, { ascending:false });
    if (!error) setRows(data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const blank = () => {
    const d = { employee_id:'', full_name:'' };
    fields.forEach(f => d[f.key] = f.type === 'number' ? '' : '');
    setDraft(d);
  };

  const save = async () => {
    if (!draft.employee_id) return alert('Employee ID required');
    const clean = { ...draft };
    delete clean.id;
    fields.forEach(f => { if (f.type === 'number') clean[f.key] = Number(clean[f.key]) || 0; });
    if (draft.id) {
      const { error } = await db.from(table).update(clean).eq('id', draft.id);
      if (error) return alert(error.message);
    } else {
      const { error } = await db.from(table).insert(clean);
      if (error) return alert(error.message);
    }
    setDraft(null); load();
  };

  const remove = async (id) => {
    if (!window.confirm('Delete this entry?')) return;
    await db.from(table).delete().eq('id', id); load();
  };

  const total = rows.reduce((s,r) => s + (Number(r.cost)||0), 0);

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc' }}>
        <div>
          <div style={{ fontWeight:800, fontSize:'14px' }}>{title}</div>
          <div style={{ fontSize:'12px', color:'#64748b' }}>{rows.length} entries · Total AED {fmt(total)}</div>
        </div>
        <button style={S.btnPri} className="hr-btn" onClick={blank}>+ Add</button>
      </div>

      {draft && (
        <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#fffbeb' }}>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr 2fr', gap:'10px', marginBottom:'8px' }}>
            <div>
              <label style={S.label}>Employee</label>
              <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
                onChange={(id,name) => setDraft(d => ({...d, employee_id:id, full_name:name}))} />
            </div>
            {fields.map(f => (
              <div key={f.key}>
                <label style={S.label}>{f.label}</label>
                {f.type === 'select'
                  ? <select value={draft[f.key]||''} onChange={e=>setDraft(d=>({...d,[f.key]:e.target.value}))} style={{...S.input, width:'100%'}}>
                      <option value="">--</option>
                      {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  : <input type={f.type==='number'?'number':f.type==='date'?'date':'text'} value={draft[f.key]||''}
                      onChange={e=>setDraft(d=>({...d,[f.key]:e.target.value}))} style={{...S.input, width:'100%'}} />}
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button style={S.btnPri} onClick={save}>Save</button>
            <button style={{...S.btnPri, background:'#fff', color:'#475569', border:'1px solid #cbd5e1'}} onClick={()=>setDraft(null)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12.5px' }}>
          <thead>
            <tr>
              <th style={S.th}>Emp ID</th><th style={S.th}>Name</th>
              {fields.map(f => <th key={f.key} style={S.th}>{f.label}</th>)}
              <th style={S.th}></th>
            </tr>
          </thead>
          <tbody>
            {loading ? <tr><td colSpan={fields.length+3} style={{padding:'24px', textAlign:'center', color:'#94a3b8'}}>Loading…</td></tr>
            : rows.length===0 ? <tr><td colSpan={fields.length+3} style={{padding:'24px', textAlign:'center', color:'#94a3b8'}}>No entries yet</td></tr>
            : rows.map(r => (
              <tr key={r.id} className="hr-row" style={{ borderTop:'1px solid #f1f5f9' }}>
                <td style={{...S.td, fontFamily:'ui-monospace,monospace', fontWeight:700, color:'#2563eb'}}>{r.employee_id}</td>
                <td style={{...S.td, fontWeight:600}}>{r.full_name}</td>
                {fields.map(f => (
                  <td key={f.key} style={S.td}>
                    {f.type==='number' ? 'AED '+fmt(r[f.key]) : f.type==='date' ? (r[f.key]||'—') : (r[f.key]||'—')}
                  </td>
                ))}
                <td style={{...S.td, textAlign:'right', whiteSpace:'nowrap'}}>
                  <button style={S.iconBtn} onClick={()=>setDraft(r)}>&#9998;</button>
                  <button style={S.iconBtn} onClick={()=>remove(r.id)}>&#128465;</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// Monthly Costs — with salary type bifurcation (monthly / hourly)
// ============================================================
function MonthlyCostsTable({ employees }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState(null);

  const load = async () => {
    setLoading(true);
    const { data, error } = await db.from('employee_monthly_costs').select('*').order('month', { ascending:false });
    if (!error) setRows(data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const blank = () => setDraft({
    employee_id:'', full_name:'', month:'',
    salary_type: 'monthly_basic',
    salary:'', food:'', accommodation:'', transport:'', other:'', remarks:'',
    hours_worked:'', hourly_rate:'', salary_deductions:'',
  });

  const save = async () => {
    if (!draft.employee_id || !draft.month) return alert('Employee ID and month are required');
    const isHourly = draft.salary_type === 'hourly';
    const grossSalary = isHourly
      ? (Number(draft.hours_worked)||0) * (Number(draft.hourly_rate)||0)
      : Number(draft.salary)||0;
    const clean = {
      employee_id: draft.employee_id, full_name: draft.full_name, month: firstOfMonth(draft.month),
      salary_type: draft.salary_type || 'monthly_basic',
      salary: grossSalary,
      food: Number(draft.food)||0, accommodation: Number(draft.accommodation)||0,
      transport: Number(draft.transport)||0, other: Number(draft.other)||0, remarks: draft.remarks||null,
      hours_worked: Number(draft.hours_worked)||0,
      hourly_rate: Number(draft.hourly_rate)||0,
      salary_deductions: Number(draft.salary_deductions)||0,
    };
    if (draft.id) {
      const { error } = await db.from('employee_monthly_costs').update(clean).eq('id', draft.id);
      if (error) return alert(error.message);
    } else {
      const { error } = await db.from('employee_monthly_costs').upsert(clean, { onConflict:'employee_id,month' });
      if (error) return alert(error.message);
    }
    setDraft(null); load();
  };

  const remove = async (id) => { if (!window.confirm('Delete this entry?')) return; await db.from('employee_monthly_costs').delete().eq('id', id); load(); };

  const isHourly = draft && draft.salary_type === 'hourly';
  const hourlyGross = isHourly ? (Number(draft.hours_worked)||0) * (Number(draft.hourly_rate)||0) : 0;
  const netPayable = isHourly ? hourlyGross - (Number(draft.salary_deductions)||0) : 0;

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc' }}>
        <div>
          <div style={{ fontWeight:800, fontSize:'14px' }}>Monthly Costs (Salary, Food, Accommodation, Transport)</div>
          <div style={{ fontSize:'12px', color:'#64748b' }}>One row per employee per month — supports monthly basic and hourly rate contracts</div>
        </div>
        <button style={S.btnPri} onClick={blank}>+ Add Month</button>
      </div>

      {draft && (
        <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#fffbeb' }}>
          {/* Employee picker */}
          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Employee</label>
            <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
              onChange={(id,name)=>setDraft(d=>({...d, employee_id:id, full_name:name}))} />
          </div>

          {/* Salary Type Toggle */}
          <div style={{ marginBottom:'12px' }}>
            <label style={S.label}>Salary Type</label>
            <div style={{ display:'flex', gap:'10px' }}>
              {[['monthly_basic','📅 Monthly Basic + Allowances'],['hourly','⏱️ Hourly Rate']].map(([val,lbl])=>(
                <label key={val} style={{ display:'flex', alignItems:'center', gap:'6px', cursor:'pointer',
                  background: draft.salary_type===val ? '#0f172a' : '#f1f5f9',
                  color: draft.salary_type===val ? '#fff' : '#475569',
                  border:'1px solid '+(draft.salary_type===val?'#0f172a':'#cbd5e1'),
                  borderRadius:'8px', padding:'8px 14px', fontWeight:700, fontSize:'12.5px' }}>
                  <input type="radio" name="salary_type" value={val}
                    checked={draft.salary_type===val}
                    onChange={()=>setDraft(d=>({...d,salary_type:val}))}
                    style={{ display:'none' }} />
                  {lbl}
                </label>
              ))}
            </div>
          </div>

          {/* Month */}
          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Month</label>
            <input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'160px'}}/>
          </div>

          {isHourly ? (
            <>
              {/* Hourly fields */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', marginBottom:'10px' }}>
                <div>
                  <label style={S.label}>Hours Worked</label>
                  <input type="number" value={draft.hours_worked||''} onChange={e=>setDraft(d=>({...d,hours_worked:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="e.g. 208"/>
                </div>
                <div>
                  <label style={S.label}>Hourly Rate (AED/hr)</label>
                  <input type="number" step="0.01" value={draft.hourly_rate||''} onChange={e=>setDraft(d=>({...d,hourly_rate:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="e.g. 7.50"/>
                </div>
                <div>
                  <label style={S.label}>Salary Deductions (AED)</label>
                  <input type="number" value={draft.salary_deductions||''} onChange={e=>setDraft(d=>({...d,salary_deductions:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="Visa + Ticket + Advance"/>
                </div>
              </div>
              {(draft.hours_worked && draft.hourly_rate) && (
                <div style={{ background:'#f0fdf4', border:'1px solid #86efac', borderRadius:'8px', padding:'10px 14px', marginBottom:'10px', fontSize:'12.5px' }}>
                  <div>Gross Salary: <strong>{fmt(draft.hours_worked)} hrs × AED {fmt(draft.hourly_rate)}/hr = <span style={{color:'#166534'}}>AED {fmt(hourlyGross)}</span></strong></div>
                  <div>Deductions: <strong style={{color:'#dc2626'}}>AED {fmt(draft.salary_deductions||0)}</strong></div>
                  <div>Net Payable: <strong style={{color: netPayable>=0?'#166534':'#dc2626'}}>AED {fmt(netPayable)}</strong></div>
                  <div style={{color:'#64748b',fontSize:'11px',marginTop:'4px'}}>Note: FAT (food/accom/transport) only when on-site & actively working. Annual leave pay, return ticket & end-of-service gratuity not applicable for hourly contracts.</div>
                </div>
              )}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px', marginBottom:'10px' }}>
                <div><label style={S.label}>Food (if on-site)</label><input type="number" value={draft.food||''} onChange={e=>setDraft(d=>({...d,food:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Accommodation (if on-site)</label><input type="number" value={draft.accommodation||''} onChange={e=>setDraft(d=>({...d,accommodation:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Transport (if on-site)</label><input type="number" value={draft.transport||''} onChange={e=>setDraft(d=>({...d,transport:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Other</label><input type="number" value={draft.other||''} onChange={e=>setDraft(d=>({...d,other:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
            </>
          ) : (
            /* Monthly basic fields */
            <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:'10px', marginBottom:'10px' }}>
              <div><label style={S.label}>Basic Salary</label><input type="number" value={draft.salary||''} onChange={e=>setDraft(d=>({...d,salary:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Food</label><input type="number" value={draft.food||''} onChange={e=>setDraft(d=>({...d,food:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Accommodation</label><input type="number" value={draft.accommodation||''} onChange={e=>setDraft(d=>({...d,accommodation:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Transport</label><input type="number" value={draft.transport||''} onChange={e=>setDraft(d=>({...d,transport:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              <div><label style={S.label}>Other</label><input type="number" value={draft.other||''} onChange={e=>setDraft(d=>({...d,other:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
            </div>
          )}

          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Remarks</label>
            <input value={draft.remarks||''} onChange={e=>setDraft(d=>({...d,remarks:e.target.value}))} style={{...S.input,width:'100%'}}/>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button style={S.btnPri} onClick={save}>Save</button>
            <button style={{...S.btnPri, background:'#fff', color:'#475569', border:'1px solid #cbd5e1'}} onClick={()=>setDraft(null)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12.5px' }}>
          <thead><tr>
            {['Emp ID','Name','Month','Type','Salary / Gross','Food','Accom.','Transport','Other','Deductions','Net Total',''].map(h=><th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {loading ? <tr><td colSpan={12} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>Loading…</td></tr>
            : rows.length===0 ? <tr><td colSpan={12} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>No entries yet</td></tr>
            : rows.map(r => {
              const isH = r.salary_type === 'hourly';
              const deductions = Number(r.salary_deductions)||0;
              const tot = (r.salary||0)+(r.food||0)+(r.accommodation||0)+(r.transport||0)+(r.other||0) - deductions;
              return (
                <tr key={r.id} className="hr-row" style={{ borderTop:'1px solid #f1f5f9' }}>
                  <td style={{...S.td,fontFamily:'ui-monospace,monospace',fontWeight:700,color:'#2563eb'}}>{r.employee_id}</td>
                  <td style={{...S.td,fontWeight:600}}>{r.full_name}</td>
                  <td style={S.td}>{monthStr(r.month)}</td>
                  <td style={S.td}>
                    {isH
                      ? <span style={{background:'#e0f2fe',color:'#0369a1',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px'}}>⏱️ Hourly</span>
                      : <span style={{background:'#f0fdf4',color:'#166534',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px'}}>📅 Monthly</span>}
                  </td>
                  <td style={S.td}>
                    {isH
                      ? <span title={`${r.hours_worked||0} hrs × ${r.hourly_rate||0}`}>{fmt(r.salary)}</span>
                      : fmt(r.salary)}
                  </td>
                  <td style={S.td}>{fmt(r.food)}</td>
                  <td style={S.td}>{fmt(r.accommodation)}</td>
                  <td style={S.td}>{fmt(r.transport)}</td>
                  <td style={S.td}>{fmt(r.other)}</td>
                  <td style={{...S.td,color:'#dc2626'}}>{deductions>0?'-'+fmt(deductions):'—'}</td>
                  <td style={{...S.td,fontWeight:700,color:tot>=0?'#0f172a':'#dc2626'}}>{fmt(tot)}</td>
                  <td style={{...S.td,textAlign:'right',whiteSpace:'nowrap'}}>
                    <button style={S.iconBtn} onClick={()=>setDraft({...r, month:monthStr(r.month), salary_type:r.salary_type||'monthly_basic'})}>&#9998;</button>
                    <button style={S.iconBtn} onClick={()=>remove(r.id)}>&#128465;</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// Timesheets
// ============================================================
function TimesheetsTable({ employees }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState(null);

  const load = async () => {
    setLoading(true);
    const { data, error } = await db.from('employee_timesheets').select('*').order('month', { ascending:false });
    if (!error) setRows(data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const blank = () => setDraft({
    employee_id:'', full_name:'', month:'', client_project:'',
    income_type: 'hourly', hours:'', rate:'', direct_income:'', remarks:'',
  });

  const save = async () => {
    if (!draft.employee_id || !draft.month) return alert('Employee ID and month are required');
    const isDirect = draft.income_type === 'direct';
    if (isDirect && !draft.direct_income) return alert('Total income amount is required');
    if (!isDirect && (!draft.hours || !draft.rate)) return alert('Hours and rate are required for hourly income');

    // For direct entries: store hours=1, rate=income_amount so DB view (hours×rate) stays correct
    const clean = {
      employee_id: draft.employee_id, full_name: draft.full_name, month: firstOfMonth(draft.month),
      client_project: draft.client_project || null,
      hours: isDirect ? 1 : Number(draft.hours)||0,
      rate: isDirect ? Number(draft.direct_income)||0 : Number(draft.rate)||0,
      remarks: draft.remarks || null,
    };

    // Try saving with income_type column; fall back without it if column not yet migrated
    const withType = { ...clean, income_type: draft.income_type || 'hourly' };
    let error;
    if (draft.id) {
      ({ error } = await db.from('employee_timesheets').update(withType).eq('id', draft.id));
      if (error && (error.message||'').includes('income_type')) {
        ({ error } = await db.from('employee_timesheets').update(clean).eq('id', draft.id));
      }
    } else {
      ({ error } = await db.from('employee_timesheets').upsert(withType, { onConflict:'employee_id,month,client_project' }));
      if (error && (error.message||'').includes('income_type')) {
        ({ error } = await db.from('employee_timesheets').upsert(clean, { onConflict:'employee_id,month,client_project' }));
      }
    }
    if (error) return alert(error.message);
    setDraft(null); load();
  };

  const remove = async (id) => { if (!window.confirm('Delete this entry?')) return; await db.from('employee_timesheets').delete().eq('id', id); load(); };

  const rowIncome = (r) => (r.hours||0) * (r.rate||0); // works for both modes (direct: hours=1, rate=income)
  const totalIncome = rows.reduce((s,r) => s + rowIncome(r), 0);

  // When editing an existing row, detect its mode
  const openEdit = (r) => {
    const isDirect = r.income_type === 'direct';
    setDraft({
      ...r,
      month: monthStr(r.month),
      income_type: r.income_type || 'hourly',
      // For direct rows, put the stored rate back in direct_income
      direct_income: isDirect ? r.rate : '',
      hours: isDirect ? '' : r.hours,
      rate: isDirect ? '' : r.rate,
    });
  };

  const isDirect = draft && draft.income_type === 'direct';

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc' }}>
        <div>
          <div style={{ fontWeight:800, fontSize:'14px' }}>Timesheets — Income</div>
          <div style={{ fontSize:'12px', color:'#64748b' }}>{rows.length} entries · Total income AED {fmt(totalIncome)}</div>
        </div>
        <button style={S.btnPri} onClick={blank}>+ Add</button>
      </div>

      {draft && (
        <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#fffbeb' }}>
          {/* Employee */}
          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Employee</label>
            <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
              onChange={(id,name)=>setDraft(d=>({...d, employee_id:id, full_name:name}))} />
          </div>

          {/* Income Type Toggle */}
          <div style={{ marginBottom:'12px' }}>
            <label style={S.label}>Income Entry Mode</label>
            <div style={{ display:'flex', gap:'10px' }}>
              {[['hourly','⏱️ Hours × Rate'],['direct','💰 Direct Amount']].map(([val,lbl])=>(
                <label key={val} style={{ display:'flex', alignItems:'center', gap:'6px', cursor:'pointer',
                  background: draft.income_type===val ? '#0f172a' : '#f1f5f9',
                  color: draft.income_type===val ? '#fff' : '#475569',
                  border:'1px solid '+(draft.income_type===val?'#0f172a':'#cbd5e1'),
                  borderRadius:'8px', padding:'8px 14px', fontWeight:700, fontSize:'12.5px' }}>
                  <input type="radio" name="income_type" value={val}
                    checked={draft.income_type===val}
                    onChange={()=>setDraft(d=>({...d, income_type:val}))}
                    style={{ display:'none' }} />
                  {lbl}
                </label>
              ))}
            </div>
          </div>

          {isDirect ? (
            /* Direct Amount mode */
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 2fr', gap:'10px', marginBottom:'10px' }}>
              <div>
                <label style={S.label}>Month</label>
                <input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'100%'}}/>
              </div>
              <div>
                <label style={S.label}>Total Income (AED)</label>
                <input type="number" step="0.01" value={draft.direct_income||''} onChange={e=>setDraft(d=>({...d,direct_income:e.target.value}))}
                  style={{...S.input,width:'100%'}} placeholder="e.g. 40378.11" autoFocus/>
              </div>
              <div>
                <label style={S.label}>Client / Project</label>
                <input value={draft.client_project||''} onChange={e=>setDraft(d=>({...d,client_project:e.target.value}))}
                  style={{...S.input,width:'100%'}} placeholder="ENPPI, Target, Brunel…"/>
              </div>
            </div>
          ) : (
            /* Hourly mode */
            <>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px', marginBottom:'8px' }}>
                <div><label style={S.label}>Month</label><input type="month" value={draft.month||''} onChange={e=>setDraft(d=>({...d,month:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Client / Project</label><input value={draft.client_project||''} onChange={e=>setDraft(d=>({...d,client_project:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="ENPPI, Target…"/></div>
                <div><label style={S.label}>Hours</label><input type="number" value={draft.hours||''} onChange={e=>setDraft(d=>({...d,hours:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
                <div><label style={S.label}>Rate (AED/hr)</label><input type="number" step="0.001" value={draft.rate||''} onChange={e=>setDraft(d=>({...d,rate:e.target.value}))} style={{...S.input,width:'100%'}}/></div>
              </div>
              {draft.hours && draft.rate && (
                <div style={{ marginBottom:'8px', fontSize:'12px', color:'#166534', fontWeight:700 }}>
                  = AED {fmt(Number(draft.hours)*Number(draft.rate))} income for this month
                </div>
              )}
            </>
          )}

          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Remarks</label>
            <input value={draft.remarks||''} onChange={e=>setDraft(d=>({...d,remarks:e.target.value}))} style={{...S.input,width:'100%'}}/>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button style={S.btnPri} onClick={save}>Save</button>
            <button style={{...S.btnPri, background:'#fff', color:'#475569', border:'1px solid #cbd5e1'}} onClick={()=>setDraft(null)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12.5px' }}>
          <thead><tr>
            {['Emp ID','Name','Month','Client/Project','Mode','Hours','Rate','Income',''].map(h=><th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {loading ? <tr><td colSpan={9} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>Loading…</td></tr>
            : rows.length===0 ? <tr><td colSpan={9} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>No entries yet</td></tr>
            : rows.map(r => {
              const isDir = r.income_type === 'direct';
              const income = rowIncome(r);
              return (
                <tr key={r.id} className="hr-row" style={{ borderTop:'1px solid #f1f5f9' }}>
                  <td style={{...S.td,fontFamily:'ui-monospace,monospace',fontWeight:700,color:'#2563eb'}}>{r.employee_id}</td>
                  <td style={{...S.td,fontWeight:600}}>{r.full_name}</td>
                  <td style={S.td}>{monthStr(r.month)}</td>
                  <td style={S.td}>{r.client_project||'—'}</td>
                  <td style={S.td}>
                    {isDir
                      ? <span style={{background:'#f0fdf4',color:'#166534',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px'}}>💰 Direct</span>
                      : <span style={{background:'#eff6ff',color:'#1d4ed8',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px'}}>⏱️ Hourly</span>}
                  </td>
                  <td style={{...S.td,color:'#94a3b8'}}>{isDir ? '—' : r.hours}</td>
                  <td style={{...S.td,color:'#94a3b8'}}>{isDir ? '—' : fmt(r.rate)}</td>
                  <td style={{...S.td,fontWeight:700,color:'#166534'}}>{fmt(income)}</td>
                  <td style={{...S.td,textAlign:'right',whiteSpace:'nowrap'}}>
                    <button style={S.iconBtn} onClick={()=>openEdit(r)}>&#9998;</button>
                    <button style={S.iconBtn} onClick={()=>remove(r.id)}>&#128465;</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const OTHER_COST_TYPES = [
  { value:'security_deposit',           label:'Security Deposit (received from employee — Income)' },
  { value:'agent_commission',           label:'Agent / Sourcing Commission (India/Nepal)' },
  { value:'salary_advance',             label:'Salary Advance Given on Arrival' },
  { value:'local_transport',            label:'Local Transport (taxi/bus during visa processing)' },
  { value:'medical_test_expense',       label:'Medical Test Day — Food/Transport' },
  { value:'food_accommodation_presite', label:'Food & Accommodation (before mobilization)' },
  { value:'site_accommodation',         label:'Site Accommodation (if not by client)' },
  { value:'visit_visa_extra',           label:'Visit Visa — Other Cost' },
  { value:'other',                      label:'Other' },
];
const OTHER_COST_LABEL = Object.fromEntries(OTHER_COST_TYPES.map(o => [o.value, o.label]));
const CURRENCIES = ['INR','PKR','PHP','NPR','LKR','BDT','USD','EUR','GBP','SAR','QAR','KWD','OMR','BHD'];

function OtherCostsTable({ employees }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState(null);
  const [filterEmp, setFilterEmp] = useState('');
  const [fxStatus, setFxStatus] = useState('');
  const [fxLoading, setFxLoading] = useState(false);

  const load = async () => {
    setLoading(true);
    const { data, error } = await db.from('employee_other_costs').select('*').order('cost_date', { ascending:false });
    if (!error) setRows(data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const blank = () => {
    setFxStatus('');
    setDraft({
      employee_id:'', full_name:'', cost_type:'security_deposit',
      cost_date: new Date().toISOString().slice(0,10),
      amount:'', recoverable:false, recovered_amount:'', notes:'',
      original_currency:'INR', original_amount:'', exchange_rate:'',
    });
  };

  const fetchFxRate = async () => {
    if (!draft.original_amount || !draft.cost_date) return alert('Enter original amount and date first');
    const cur = draft.original_currency || 'INR';
    setFxLoading(true); setFxStatus('Fetching exchange rate…');
    const directUrl = `https://api.frankfurter.app/${draft.cost_date}?from=${cur}&to=AED`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(directUrl)}`;
    let json = null;
    try {
      const res = await fetch(directUrl, { mode:'cors' });
      if (res.ok) json = await res.json();
    } catch (_) { /* CORS blocked from file:// — expected */ }
    if (!json) {
      try {
        const res2 = await fetch(proxyUrl);
        if (res2.ok) json = await res2.json();
      } catch (e2) { }
    }
    setFxLoading(false);
    if (json && json.rates && json.rates.AED) {
      const rate = json.rates.AED;
      const aed = (Number(draft.original_amount) * rate).toFixed(2);
      setDraft(d => ({...d,
        exchange_rate: rate,
        amount: aed,
        notes: `${cur} ${Number(d.original_amount).toLocaleString()} × ${rate} = AED ${aed} (rate date: ${json.date})`,
      }));
      setFxStatus(`✓ 1 ${cur} = ${rate} AED  (${json.date})`);
    } else {
      setFxStatus('Could not fetch rate. Check internet or enter AED amount manually.');
    }
  };

  const save = async () => {
    if (!draft.employee_id) return alert('Employee is required');
    if (!draft.cost_type) return alert('Cost type is required');
    const clean = {
      employee_id: draft.employee_id, full_name: draft.full_name || null,
      cost_type: draft.cost_type, cost_date: draft.cost_date || new Date().toISOString().slice(0,10),
      amount: Number(draft.amount)||0, recoverable: !!draft.recoverable,
      recovered_amount: Number(draft.recovered_amount)||0, notes: draft.notes || null,
      original_currency: draft.original_currency || null,
      original_amount: Number(draft.original_amount)||null,
      exchange_rate: Number(draft.exchange_rate)||null,
    };
    if (draft.id) {
      const { error } = await db.from('employee_other_costs').update(clean).eq('id', draft.id);
      if (error) return alert(error.message);
    } else {
      const { error } = await db.from('employee_other_costs').insert(clean);
      if (error) return alert(error.message);
    }
    setDraft(null); setFxStatus(''); load();
  };

  const remove = async (id) => {
    if (!window.confirm('Delete this entry?')) return;
    await db.from('employee_other_costs').delete().eq('id', id); load();
  };

  const isDeposit = draft && draft.cost_type === 'security_deposit';

  const visibleRows = useMemo(() => filterEmp ? rows.filter(r => r.employee_id === filterEmp) : rows, [rows, filterEmp]);
  const depositRows = visibleRows.filter(r => r.cost_type === 'security_deposit');
  const expenseRows = visibleRows.filter(r => r.cost_type !== 'security_deposit');
  const totalDeposits = depositRows.reduce((s,r) => s + (Number(r.amount)||0), 0);
  const totalExpense = expenseRows.reduce((s,r) => s + (Number(r.amount)||0), 0);
  const totalRecovered = visibleRows.reduce((s,r) => s + (Number(r.recovered_amount)||0), 0);
  const outstanding = visibleRows.reduce((s,r) => s + (r.recoverable ? (Number(r.amount)||0) - (Number(r.recovered_amount)||0) : 0), 0);

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc', flexWrap:'wrap', gap:'10px' }}>
        <div>
          <div style={{ fontWeight:800, fontSize:'14px' }}>Onboarding & Misc Costs</div>
          <div style={{ fontSize:'12px', color:'#64748b' }}>
            {visibleRows.length} entries · Expense AED {fmt(totalExpense)}
            {totalDeposits > 0 && <span style={{color:'#166534',fontWeight:700}}> · 💰 Deposits received: AED {fmt(totalDeposits)}</span>}
            {' · '}Recovered AED {fmt(totalRecovered)} · Outstanding AED {fmt(outstanding)}
          </div>
        </div>
        <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>
          <input list="emp-list-other" placeholder="Filter by Employee ID" value={filterEmp}
            onChange={e=>setFilterEmp(e.target.value)} style={{ ...S.input, width:'170px' }} />
          <datalist id="emp-list-other">
            {employees.map(e => <option key={e.id||e.employee_id} value={e.employee_id}>{e.full_name}</option>)}
          </datalist>
          <button style={S.btnPri} onClick={blank}>+ Add</button>
        </div>
      </div>

      {draft && (
        <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#fffbeb' }}>
          <div style={{ marginBottom:'10px' }}>
            <label style={S.label}>Employee</label>
            <EmployeePicker employees={employees} value={draft.employee_id} name={draft.full_name}
              onChange={(id,name)=>setDraft(d=>({...d, employee_id:id, full_name:name}))} />
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:'10px', marginBottom:'10px' }}>
            <div>
              <label style={S.label}>Cost Type</label>
              <select value={draft.cost_type} onChange={e=>setDraft(d=>({...d, cost_type:e.target.value}))} style={{...S.input, width:'100%'}}>
                {OTHER_COST_TYPES.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
            <div>
              <label style={S.label}>Date</label>
              <input type="date" value={draft.cost_date} onChange={e=>setDraft(d=>({...d, cost_date:e.target.value}))} style={{...S.input, width:'100%'}} />
            </div>
          </div>

          {isDeposit && (
            <div style={{ background:'#f0fdf4', border:'1px solid #86efac', borderRadius:'8px', padding:'12px 14px', marginBottom:'10px' }}>
              <div style={{ fontWeight:700, fontSize:'12.5px', color:'#166534', marginBottom:'8px' }}>
                💰 Security Deposit — Auto Currency Converter
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'140px 1fr 1fr auto', gap:'8px', alignItems:'end' }}>
                <div>
                  <label style={S.label}>Currency</label>
                  <select value={draft.original_currency||'INR'} onChange={e=>setDraft(d=>({...d,original_currency:e.target.value}))} style={{...S.input,width:'100%'}}>
                    {CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.label}>Original Amount ({draft.original_currency||'INR'})</label>
                  <input type="number" value={draft.original_amount||''} onChange={e=>setDraft(d=>({...d,original_amount:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="e.g. 20000"/>
                </div>
                <div>
                  <label style={S.label}>Amount in AED (auto-filled)</label>
                  <input type="number" step="0.01" value={draft.amount||''} onChange={e=>setDraft(d=>({...d,amount:e.target.value}))} style={{...S.input,width:'100%'}} placeholder="e.g. 811.69"/>
                </div>
                <div>
                  <button onClick={fetchFxRate} disabled={fxLoading}
                    style={{...S.btnPri, background:'#166534', padding:'8px 14px', whiteSpace:'nowrap'}}>

                </div>

              {fxStatus && (

                  {fxStatus}

            <div style={{ marginBottom:'10px' }}>
              <label style={S.label}>Amount (AED)</label>
              <input type="number" value={draft.amount||''} onChange={e=>setDraft(d=>({...d, amount:e.target.value}))} style={{...S.input, width:'200px'}} />
            </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 2fr', gap:'10px', marginBottom:'10px', alignItems:'end' }}>

            <div>

            </div>
            <div>
              <label style={S.label}>Notes</label>
              <input value={draft.notes||''} onChange={e=>setDraft(d=>({...d, notes:e.target.value}))} style={{...S.input, width:'100%'}}

            <button style={S.btnPri} onClick={save}>Save</button>
            <button style={{...S.btnPri, background:'#fff', color:'#475569', border:'1px solid #cbd5e1'}} onClick={()=>{setDraft(null);setFxStatus('');}}>Cancel</button>

              const isDep = r.cost_type === 'security_deposit';
              return (
                <tr key={r.id} className="hr-row" style={{ borderTop:'1px solid #f1f5f9', background: isDep ? '#f0fdf4' : 'transparent' }}>
                  <td style={{...S.td, fontFamily:'ui-monospace,monospace', fontWeight:700, color:'#2563eb'}}>{r.employee_id}</td>
                  <td style={{...S.td, fontWeight:600}}>{r.full_name}</td>
                  <td style={S.td}>
                    {isDep
                      ? <span>💰 <span style={{background:'#dcfce7',color:'#166534',fontSize:'10.5px',fontWeight:700,padding:'2px 7px',borderRadius:'10px'}}>Income</span> {OTHER_COST_LABEL[r.cost_type]||r.cost_type}</span>
                      : (OTHER_COST_LABEL[r.cost_type] || r.cost_type)}
                  </td>
                  <td style={S.td}>{r.cost_date || '—'}</td>
                  <td style={{...S.td, fontWeight:700, color: isDep?'#166534':'#0f172a'}}>
                    {isDep ? '+' : ''}{fmt(r.amount)}
                    {r.original_currency && r.original_amount && <div style={{fontSize:'10px',color:'#94a3b8'}}>{r.original_currency} {Number(r.original_amount).toLocaleString()}</div>}
                  </td>
                  <td style={S.td}>{!isDep && r.recoverable ? <span style={{background:'#fef3c7',color:'#92400e',fontSize:'11px',fontWeight:700,padding:'2px 8px',borderRadius:'10px'}}>Yes</span> : '—'}</td>
                  <td style={S.td}>{!isDep && r.recoverable ? fmt(r.recovered_amount) : '—'}</td>
                  <td style={{...S.td, fontWeight:700, color: out>0 ? '#dc2626' : '#94a3b8'}}>{!isDep && r.recoverable ? fmt(out) : '—'}</td>
                  <td style={{...S.td, fontSize:'11.5px', maxWidth:'220px', whiteSpace:'normal'}}>{r.notes || '—'}</td>
                  <td style={{...S.td, textAlign:'right', whiteSpace:'nowrap'}}>
                    <button style={S.iconBtn} onClick={()=>{setFxStatus('');setDraft({...r, cost_date: r.cost_date || '', original_currency:r.original_currency||'INR'});}}>&#9998;</button>
                    <button style={S.iconBtn} onClick={()=>remove(r.id)}>&#128465;</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// P&L Dashboard — with security deposit correction
// ============================================================
function PnlDashboard({ empMeta }) {
  const [summary, setSummary] = useState([]);
  const [monthly, setMonthly] = useState([]);
  const [deposits, setDeposits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedEmp, setSelectedEmp] = useState(null);

  const load = async () => {
    setLoading(true);
    const [s, m, d] = await Promise.all([
      db.from('employee_pnl_summary').select('*').order('lifetime_net', { ascending:true }),
      db.from('employee_pnl_monthly').select('*').order('month', { ascending:true }),
      db.from('employee_other_costs').select('employee_id,amount').eq('cost_type','security_deposit'),
    ]);
    if (s.data) setSummary(s.data);
    if (m.data) setMonthly(m.data);
    if (d.data) setDeposits(d.data);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  // Map of employee_id -> total security deposits received
  const depositMap = useMemo(() => {
    const m = {};
    deposits.forEach(d => { m[d.employee_id] = (m[d.employee_id]||0) + (Number(d.amount)||0); });
    return m;
  }, [deposits]);

  const empMonthly = useMemo(() => monthly.filter(r => r.employee_id === selectedEmp), [monthly, selectedEmp]);

  // Grand totals — corrected for security deposits (deposits are income, not expense)
  const G = summary.reduce((a, r) => {
    const dep = depositMap[r.employee_id] || 0;
    return {
      income:  a.income  + (r.lifetime_income||0)  + dep,
      expense: a.expense + Math.max(0, (r.lifetime_expense||0) - dep),
      net:     a.net     + (r.lifetime_net||0) + 2 * dep,
    };
  }, { income:0, expense:0, net:0 });

  const totalDeposits = Object.values(depositMap).reduce((s,v)=>s+v,0);

  return (
    <div>
      {/* Top summary cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'12px', marginBottom:'16px' }}>
        <div style={{...S.card, padding:'16px'}}>
          <div style={{ fontSize:'12px', color:'#64748b', fontWeight:600 }}>Total Income (all employees)</div>
          <div style={{ fontSize:'22px', fontWeight:800, color:'#166534', marginTop:'6px' }}>AED {fmt(G.income)}</div>
          {totalDeposits > 0 && <div style={{ fontSize:'11px', color:'#64748b', marginTop:'4px' }}>incl. 💰 AED {fmt(totalDeposits)} deposits received</div>}
        </div>
        <div style={{...S.card, padding:'16px'}}>
          <div style={{ fontSize:'12px', color:'#64748b', fontWeight:600 }}>Total Expense (all employees)</div>
          <div style={{ fontSize:'22px', fontWeight:800, color:'#dc2626', marginTop:'6px' }}>AED {fmt(G.expense)}</div>
        </div>
        <div style={{...S.card, padding:'16px'}}>
          <div style={{ fontSize:'12px', color:'#64748b', fontWeight:600 }}>Net Profit / Loss</div>
          <div style={{ fontSize:'22px', marginTop:'6px' }}><AmountTag value={G.net} /></div>
        </div>
      </div>

      {/* Per-employee summary table */}
      <div style={{...S.card, marginBottom:'16px'}}>
        <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc', fontWeight:800, fontSize:'14px' }}>
          Lifetime Profitability by Employee
        </div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12.5px' }}>
            <thead><tr>{['Emp ID','Name','Total Income','Deposits Received','Total Expense','Onboarding Cost','Advance Outstanding','Net P/L','Idle Months',''].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {loading ? <tr><td colSpan={10} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>Loading…</td></tr>
              : summary.length===0 ? <tr><td colSpan={10} style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>No data yet — add entries in the tabs above</td></tr>
              : summary.map(r => {
                const dep = depositMap[r.employee_id] || 0;
                const adjIncome = (r.lifetime_income||0) + dep;
                const adjExpense = Math.max(0, (r.lifetime_expense||0) - dep);
                const adjNet = (r.lifetime_net||0) + 2 * dep;
                return (
                  <tr key={r.employee_id} className="hr-row" style={{ borderTop:'1px solid #f1f5f9', cursor:'pointer', background: selectedEmp===r.employee_id?'#eff6ff':'transparent' }}
                    onClick={()=>setSelectedEmp(r.employee_id===selectedEmp?null:r.employee_id)}>
                    <td style={{...S.td,fontFamily:'ui-monospace,monospace',fontWeight:700,color:'#2563eb'}}>{r.employee_id}</td>
                    <td style={{...S.td,fontWeight:600}}>{r.full_name}</td>
                    <td style={{...S.td,color:'#166534',fontWeight:700}}>{fmt(adjIncome)}</td>
                    <td style={S.td}>
                      {dep > 0
                        ? <span style={{color:'#166534',fontWeight:700}}>💰 {fmt(dep)}</span>
                        : <span style={{color:'#cbd5e1'}}>—</span>}
                    </td>
                    <td style={{...S.td,color:'#dc2626',fontWeight:700}}>{fmt(adjExpense)}</td>
                    <td style={S.td}>{fmt(r.lifetime_onboarding_cost)}</td>
                    <td style={S.td}>{(r.advance_outstanding||0)>0
                      ? <span style={{background:'#fef3c7',color:'#92400e',fontSize:'11px',fontWeight:700,padding:'2px 8px',borderRadius:'10px'}}>{fmt(r.advance_outstanding)}</span>
                      : <span style={{color:'#cbd5e1'}}>—</span>}</td>
                    <td style={S.td}><AmountTag value={adjNet} /></td>
                    <td style={S.td}>
                      {r.idle_months>0
                        ? <span style={{background:'#fef3c7',color:'#92400e',fontSize:'11px',fontWeight:700,padding:'2px 8px',borderRadius:'10px'}}>{r.idle_months} idle</span>
                        : <span style={{color:'#cbd5e1'}}>—</span>}
                    </td>
                    <td style={{...S.td,textAlign:'right',color:'#94a3b8',fontSize:'11px'}}>{selectedEmp===r.employee_id?'▲ hide months':'▼ view months'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Employee HR Snapshot */}
      {selectedEmp && empMeta && empMeta[selectedEmp] && (
        <div style={{...S.card, marginBottom:'16px', padding:'14px 18px'}}>
          <div style={{ fontWeight:800, fontSize:'14px', marginBottom:'8px' }}>HR Snapshot — {empMeta[selectedEmp].full_name}</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px', fontSize:'12.5px' }}>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Position</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].position||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Nationality</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].nationality||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Joining Date</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].joining_date||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Status</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].status||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Hired From</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].hired_from||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Supplier / Agent</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].supplier_name||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Mobilization Date</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].mobilization_date||'—'}</div></div>
            <div><div style={{color:'#94a3b8',fontWeight:600}}>Site / Location</div><div style={{fontWeight:700}}>{empMeta[selectedEmp].location||'—'}</div></div>
          </div>
        </div>
      )}

      {/* Per-employee monthly breakdown */}
      {selectedEmp && (
        <div style={S.card}>
          <div style={{ padding:'14px 18px', borderBottom:'1px solid #e2e8f0', background:'#f8fafc', fontWeight:800, fontSize:'14px' }}>
            Monthly Breakdown — {selectedEmp}
          </div>
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12.5px' }}>
              <thead><tr>{['Month','Salary','Food','Accom.','Transport','Other','Visa','Flights','Training','Onboarding','Total Exp.','Income','Net P/L'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {empMonthly.map(r => (
                  <tr key={r.month} className="hr-row" style={{ borderTop:'1px solid #f1f5f9', background: r.total_income===0 ? '#fffbeb' : 'transparent' }}>
                    <td style={{...S.td,fontWeight:700,whiteSpace:'nowrap'}}>{monthStr(r.month)}{r.total_income===0 && <span style={{marginLeft:'6px',fontSize:'10px',background:'#fde68a',color:'#92400e',padding:'1px 6px',borderRadius:'8px'}}>idle</span>}</td>
                    <td style={S.td}>{fmt(r.salary)}</td>
                    <td style={S.td}>{fmt(r.food)}</td>
                    <td style={S.td}>{fmt(r.accommodation)}</td>
                    <td style={S.td}>{fmt(r.transport)}</td>
                    <td style={S.td}>{fmt(r.other_cost)}</td>
                    <td style={S.td}>{fmt(r.visa_cost)}</td>
                    <td style={S.td}>{fmt(r.flight_cost)}</td>
                    <td style={S.td}>{fmt(r.training_cost)}</td>
                    <td style={S.td}>{fmt(r.onboarding_cost)}</td>
                    <td style={{...S.td,fontWeight:700,color:'#dc2626'}}>{fmt(r.total_expense)}</td>
                    <td style={{...S.td,fontWeight:700,color:'#166534'}}>{fmt(r.total_income)}</td>
                    <td style={S.td}><AmountTag value={r.net_profit_loss} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// Login Screen
// ============================================================
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) { setError(error.message); return; }
    onLogin(data.session);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#f1f5f9' }}>
      <form onSubmit={submit} style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:'12px', padding:'32px', width:'320px' }}>
        <h2 style={{ margin:'0 0 4px', fontSize:'18px', fontWeight:800 }}>SATCO Finance</h2>
        <div style={{ fontSize:'12px', color:'#64748b', marginBottom:'20px' }}>Sign in to continue</div>
        <label style={S.label}>Email</label>
        <input style={{...S.input, width:'100%', marginBottom:'12px'}} type="email" value={email} onChange={e=>setEmail(e.target.value)} required />
        <label style={S.label}>Password</label>
        <input style={{...S.input, width:'100%', marginBottom:'16px'}} type="password" value={password} onChange={e=>setPassword(e.target.value)} required />
        {error && <div style={{ color:'#dc2626', fontSize:'12px', marginBottom:'12px' }}>{error}</div>}
        <button type="submit" disabled={loading} style={{...S.btnPri, width:'100%'}}>{loading ? 'Signing in...' : 'Sign In'}</button>
      </form>
    </div>
  );
}
